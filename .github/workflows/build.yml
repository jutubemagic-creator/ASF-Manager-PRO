name: Build ASF Manager PRO

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish single-file EXE
        run: dotnet publish ASFManagerPRO.csproj -c Release -p:PublishSingleFile=true -p:SelfContained=true -p:RuntimeIdentifier=win-x64 -o publish

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: ASF-Manager-PRO
          path: publish/ASFManagerPRO.exe
