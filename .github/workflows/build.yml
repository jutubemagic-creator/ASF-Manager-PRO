name: Build ASF Manager PRO

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore ASFManagerPRO.csproj

      - name: Publish single-file EXE
        run: |
          dotnet publish ASFManagerPRO.csproj -c Release `
            -p:PublishSingleFile=true `
            -p:SelfContained=true `
            -p:RuntimeIdentifier=win-x64 `
            -p:PublishTrimmed=false `
            -p:DebugType=none `
            -p:DebugSymbols=false `
            -o publish

      - name: Copy index.html to publish folder
        run: copy index.html publish\

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ASF-Manager-PRO
          path: publish/
          retention-days: 30
