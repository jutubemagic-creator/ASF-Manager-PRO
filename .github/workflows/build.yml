name: Build ASF Manager PRO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Publish single EXE
        run: dotnet publish -c Release -p:PublishSingleFile=true -p:SelfContained=true -p:RuntimeIdentifier=win-x64 --no-self-contained false -o publish

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: ASF-Manager-PRO
          path: publish/ASFManagerPRO.exe
