<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ASF Manager PRO v3.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap');
        
        * {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        
        body {
            background: radial-gradient(ellipse at 20% 30%, #0f0f1a, #050508);
            min-height: 100vh;
        }
        
        /* Анимации */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes slideIn {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        /* Сайдбар */
        .sidebar {
            background: rgba(8, 8, 12, 0.9);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.06);
        }
        
        .sidebar-btn {
            transition: all 0.25s;
            border-radius: 14px;
            color: #9ca3af;
            font-weight: 500;
        }
        
        .sidebar-btn:hover {
            background: rgba(0, 180, 255, 0.12);
            color: white;
            transform: translateX(4px);
        }
        
        .sidebar-btn.active {
            background: linear-gradient(135deg, rgba(0, 180, 255, 0.2), rgba(0, 136, 204, 0.1));
            color: #00b4ff;
            border-left: 2px solid #00b4ff;
        }
        
        /* Карточка аккаунта */
        .account-card {
            background: linear-gradient(135deg, rgba(22, 25, 35, 0.95) 0%, rgba(16, 18, 25, 0.98) 100%);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.4s ease-out;
        }
        
        .account-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #00b4ff, #00ff88, #00b4ff);
            transform: scaleX(0);
            transition: transform 0.4s;
        }
        
        .account-card:hover::before {
            transform: scaleX(1);
        }
        
        .account-card:hover {
            transform: translateY(-6px);
            border-color: rgba(0, 180, 255, 0.3);
            box-shadow: 0 25px 40px -18px rgba(0, 180, 255, 0.3);
        }
        
        /* Аватар */
        .card-avatar {
            width: 52px;
            height: 52px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 700;
            transition: all 0.3s;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.3);
        }
        
        .account-card:hover .card-avatar {
            transform: scale(1.05) rotate(3deg);
            border-radius: 14px;
        }
        
        /* Статус бейдж */
        .status-badge {
            padding: 5px 12px;
            border-radius: 40px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.3px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .status-online {
            background: linear-gradient(135deg, #00ff88, #00b4ff);
            color: #0a0a0f;
            box-shadow: 0 2px 10px rgba(0, 255, 136, 0.25);
        }
        
        .status-offline {
            background: rgba(55, 65, 81, 0.5);
            color: #9ca3af;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        /* Информационные блоки */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 16px;
        }
        
        .info-item {
            background: rgba(0, 0, 0, 0.35);
            border-radius: 14px;
            padding: 8px 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        
        .info-item i {
            width: 18px;
            font-size: 12px;
            color: #00b4ff;
        }
        
        .info-label {
            font-size: 11px;
            color: #9ca3af;
            font-weight: 500;
        }
        
        .info-value {
            font-size: 12px;
            color: #f0f0f0;
            font-weight: 600;
            margin-left: auto;
        }
        
        .balance-value {
            color: #00ff88;
            font-weight: 700;
        }
        
        .account-card:hover .info-item {
            background: rgba(0, 180, 255, 0.08);
            border-color: rgba(0, 180, 255, 0.12);
        }
        
        /* Кнопки на карточке */
        .card-actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }
        
        .card-btn {
            flex: 1;
            padding: 9px 0;
            border-radius: 14px;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            border: none;
        }
        
        .card-btn i {
            font-size: 11px;
        }
        
        .card-btn-asf {
            background: linear-gradient(135deg, #00ff88, #00cc66);
            color: #0a0a0f;
            box-shadow: 0 2px 8px rgba(0, 255, 136, 0.2);
        }
        
        .card-btn-asf:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.4);
        }
        
        .card-btn-inventory {
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            color: white;
        }
        
        .card-btn-inventory:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(168, 85, 247, 0.4);
        }
        
        .card-btn-edit {
            background: rgba(255, 255, 255, 0.08);
            color: #d1d5db;
            flex: none;
            width: 40px;
        }
        
        .card-btn-edit:hover {
            background: rgba(0, 180, 255, 0.25);
            color: #00b4ff;
            transform: translateY(-2px);
        }
        
        .card-btn-delete {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            flex: none;
            width: 40px;
        }
        
        .card-btn-delete:hover {
            background: rgba(239, 68, 68, 0.35);
            color: #ff8888;
            transform: translateY(-2px);
        }
        
        /* Чекбокс */
        .card-checkbox {
            position: absolute;
            top: 14px;
            left: 14px;
            z-index: 10;
            width: 18px;
            height: 18px;
            accent-color: #00b4ff;
            cursor: pointer;
        }
        
        /* Поиск и фильтры - ИСПРАВЛЕНО */
        .search-input {
            background: rgba(31, 41, 55, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 12px 20px 12px 45px;
            transition: all 0.2s;
            color: white !important;
            font-size: 14px;
        }
        
        .search-input::placeholder {
            color: #9ca3af;
        }
        
        .search-input:focus {
            outline: none;
            border-color: #00b4ff;
            background: rgba(31, 41, 55, 0.95);
            box-shadow: 0 0 0 3px rgba(0, 180, 255, 0.1);
        }
        
        /* SELECT - ИСПРАВЛЕНО */
        select {
            background: rgba(31, 41, 55, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 12px 16px;
            color: white !important;
            cursor: pointer;
            font-size: 14px;
        }
        
        select option {
            background: #1f2937;
            color: white;
        }
        
        select:focus {
            outline: none;
            border-color: #00b4ff;
        }
        
        /* Кнопки действий */
        .action-btn {
            background: rgba(31, 41, 55, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 12px 20px;
            color: white;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .action-btn:hover {
            background: #00b4ff;
            color: black;
            transform: translateY(-2px);
        }
        
        .danger-btn {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.3);
            color: #f87171;
        }
        
        .danger-btn:hover {
            background: #ef4444;
            color: white;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #00b4ff, #0088cc);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            font-weight: 600;
            box-shadow: 0 10px 25px -5px rgba(0, 180, 255, 0.4);
        }
        
        /* Скролл */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(31, 41, 55, 0.3);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #00b4ff, #00ff88);
            border-radius: 10px;
        }
        
        /* Модальные окна - ИСПРАВЛЕНО */
        .modal-content {
            background: rgba(18, 20, 26, 0.98);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
        }
        
        input, textarea {
            background: rgba(31, 41, 55, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 12px 16px;
            color: white !important;
            transition: all 0.2s;
        }
        
        input::placeholder, textarea::placeholder {
            color: #6b7280;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: #00b4ff;
            background: rgba(31, 41, 55, 0.95);
            box-shadow: 0 0 0 2px rgba(0, 180, 255, 0.1);
        }
        
        label {
            color: #9ca3af;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
            display: block;
        }
        
        /* Детальный просмотр */
        .detail-row {
            display: flex;
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            align-items: flex-start;
            transition: all 0.2s;
        }
        
        .detail-row:hover {
            background: rgba(0, 180, 255, 0.08);
            border-radius: 12px;
        }
        
        .detail-label {
            width: 140px;
            font-weight: 600;
            color: #9ca3af;
        }
        
        .detail-value {
            flex: 1;
            color: white;
            word-break: break-word;
        }
        
        .copy-btn {
            cursor: pointer;
            padding: 4px 10px;
            background: rgba(0, 180, 255, 0.15);
            border-radius: 8px;
            font-size: 10px;
            margin-left: 10px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: #00b4ff;
        }
        
        .copy-btn:hover {
            background: rgba(0, 180, 255, 0.3);
            color: white;
        }
        
        /* Инвентарь */
        .inventory-item {
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 12px;
            text-align: center;
        }
        
        .inventory-item:hover {
            transform: scale(1.05);
            background: rgba(0, 180, 255, 0.15);
        }
        
        /* Статистика */
        .stat-card {
            background: linear-gradient(135deg, rgba(22, 25, 35, 0.95), rgba(16, 18, 25, 0.98));
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 20px;
            transition: all 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-4px);
            border-color: rgba(0, 180, 255, 0.3);
        }
        
        /* Пустое состояние */
        .empty-state {
            background: rgba(31, 41, 55, 0.3);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            border: 1px dashed rgba(255, 255, 255, 0.1);
        }
        
        /* Основные кнопки */
        .btn-primary {
            background: linear-gradient(135deg, #00b4ff, #0088cc);
            transition: all 0.2s;
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 180, 255, 0.3);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #00ff88, #00cc66);
            color: #0a0a0f;
        }
        
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.3);
        }
        
        /* Текст */
        .text-gradient {
            background: linear-gradient(135deg, #00b4ff, #00ff88);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        /* Дополнительно для селектов в модалках */
        .modal-content select {
            background: rgba(31, 41, 55, 0.8);
            color: white !important;
            width: 100%;
        }
        
        .modal-content select option {
            background: #1f2937;
            color: white;
        }
        
        /* Инпут для баланса и других полей */
        input[type="text"], input[type="password"], input[type="email"], textarea {
            color: white !important;
        }
    </style>
</head>
<body>
<div class="flex h-screen">
    <!-- Сайдбар -->
    <div class="sidebar w-72 p-6 flex flex-col">
        <div class="flex items-center gap-3 mb-8">
            <div class="w-12 h-12 bg-gradient-to-br from-[#00b4ff] to-[#00ff88] rounded-2xl flex items-center justify-center text-2xl shadow-lg">
                🎮
            </div>
            <div>
                <h1 class="text-xl font-bold text-gradient">ASF PRO</h1>
                <p class="text-xs text-gray-500">Manager v3.3</p>
            </div>
        </div>
        
        <button onclick="addNewAccount()" class="btn-primary w-full py-3 rounded-2xl font-bold flex items-center justify-center gap-2 transition mb-3 shadow-lg">
            <i class="fas fa-plus"></i> Добавить аккаунт
        </button>
        
        <button onclick="runASFForAll()" class="btn-success w-full py-3 rounded-2xl font-bold flex items-center justify-center gap-2 transition mb-6 shadow-lg">
            <i class="fas fa-play"></i> Запустить всех
        </button>
        
        <div class="space-y-1">
            <button onclick="switchTab('accounts')" id="tabAccounts" class="sidebar-btn w-full text-left px-4 py-3 rounded-xl flex items-center gap-3 transition">
                <i class="fas fa-users w-5"></i> Аккаунты
            </button>
            <button onclick="switchTab('inventory')" id="tabInventory" class="sidebar-btn w-full text-left px-4 py-3 rounded-xl flex items-center gap-3 transition">
                <i class="fas fa-box w-5"></i> Инвентарь
            </button>
            <button onclick="switchTab('stats')" id="tabStats" class="sidebar-btn w-full text-left px-4 py-3 rounded-xl flex items-center gap-3 transition">
                <i class="fas fa-chart-line w-5"></i> Статистика
            </button>
            <button onclick="switchTab('settings')" id="tabSettings" class="sidebar-btn w-full text-left px-4 py-3 rounded-xl flex items-center gap-3 transition">
                <i class="fas fa-cog w-5"></i> Настройки
            </button>
        </div>
        
        <div class="mt-auto pt-6 text-xs text-gray-500 border-t border-gray-800/50">
            <i class="fas fa-database"></i> Локальное хранение<br>
            <span id="accountCount" class="font-bold text-[#00b4ff]">0 аккаунтов</span>
        </div>
    </div>
    
    <!-- Основная область -->
    <div class="flex-1 p-6 overflow-auto" id="mainContent"></div>
</div>

<!-- Модальные окна -->
<div id="detailModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center z-50 p-4">
    <div class="modal-content w-[900px] max-h-[85vh] overflow-auto p-6">
        <div class="flex justify-between items-center mb-5 pb-3 border-b border-gray-700">
            <h2 id="detailTitle" class="text-2xl font-bold text-white"></h2>
            <button onclick="closeDetailModal()" class="text-gray-400 hover:text-white text-3xl transition">&times;</button>
        </div>
        <div id="detailContent" class="mb-5"></div>
        <div class="flex gap-3 pt-3">
            <button onclick="editFromDetail()" class="flex-1 py-3 bg-[#00b4ff] text-black font-bold rounded-xl transition hover:scale-105">Редактировать</button>
            <button onclick="runASFFromDetail()" class="flex-1 py-3 bg-green-600 text-white font-bold rounded-xl transition hover:scale-105">Запустить ASF</button>
            <button onclick="deleteFromDetail()" class="flex-1 py-3 bg-red-600 text-white font-bold rounded-xl transition hover:scale-105">Удалить</button>
            <button onclick="closeDetailModal()" class="flex-1 py-3 bg-gray-700 text-white font-bold rounded-xl transition hover:scale-105">Закрыть</button>
        </div>
    </div>
</div>

<div id="editModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center z-50 p-4">
    <div class="modal-content w-[800px] max-h-[85vh] overflow-auto p-6">
        <h2 id="editTitle" class="text-2xl font-bold mb-5 text-white">Редактирование</h2>
        <div class="grid grid-cols-2 gap-4">
            <div><label>Логин Steam *</label><input id="editLogin" class="w-full" placeholder="Введите логин"></div>
            <div><label>Пароль Steam</label><input id="editPassword" type="password" class="w-full" placeholder="Введите пароль"></div>
            <div><label>Steam ID</label><input id="editSteamId" class="w-full" placeholder="7656119..."></div>
            <div><label>Баланс</label><input id="editBalance" class="w-full" placeholder="0 ₽"></div>
            <div><label>Почта</label><input id="editEmail" class="w-full" placeholder="email@example.com"></div>
            <div><label>Пароль почты</label><input id="editEmailPass" type="password" class="w-full" placeholder="Пароль от почты"></div>
            <div><label>Прокси (ip:port)</label><input id="editProxy" class="w-full" placeholder="127.0.0.1:8080"></div>
            <div><label>PIN-код</label><input id="editPin" class="w-full" placeholder="PIN-код"></div>
            <div class="col-span-2"><label>MaFile (JSON)</label><textarea id="editMaFile" rows="3" class="w-full font-mono text-xs" placeholder='{"shared_secret":"..."}'></textarea></div>
            <div class="col-span-2"><label>Заметки</label><textarea id="editNotes" rows="2" class="w-full" placeholder="Дополнительная информация..."></textarea></div>
        </div>
        <div class="flex gap-3 mt-6">
            <button onclick="saveEditedAccount()" class="flex-1 py-3 bg-[#00b4ff] text-black font-bold rounded-xl transition hover:scale-105">Сохранить</button>
            <button onclick="closeEditModal()" class="flex-1 py-3 bg-gray-700 text-white font-bold rounded-xl transition hover:scale-105">Отмена</button>
        </div>
    </div>
</div>

<div id="massEditModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center z-50 p-4">
    <div class="modal-content w-[500px] p-6">
        <h2 class="text-2xl font-bold mb-5 text-white">Массовое редактирование</h2>
        <div class="mb-4">
            <label>Поле для изменения:</label>
            <select id="massEditField" class="w-full mt-1">
                <option value="Proxy">🌐 Прокси</option>
                <option value="Notes">📝 Заметки</option>
                <option value="Status">🟢 Статус</option>
            </select>
        </div>
        <div class="mb-6">
            <label>Новое значение:</label>
            <input type="text" id="massEditValue" class="w-full mt-1" placeholder="Введите значение...">
        </div>
        <div class="flex gap-3">
            <button onclick="applyMassEdit()" class="flex-1 py-3 bg-[#00b4ff] text-black font-bold rounded-xl transition hover:scale-105">Применить</button>
            <button onclick="closeMassEditModal()" class="flex-1 py-3 bg-gray-700 text-white font-bold rounded-xl transition hover:scale-105">Отмена</button>
        </div>
    </div>
</div>

<script>
let accounts = [];
let currentTab = 'accounts';
let currentDetailAccount = null;
let currentEditId = null;
let currentFilter = '';
let currentSort = 'date-desc';
let showPasswords = {};
let selectedAccountsForMass = new Set();
let searchTimeout = null;

const games = [
    { name: "Counter-Strike 2", appId: "730" },
    { name: "Dota 2", appId: "570" },
    { name: "Team Fortress 2", appId: "440" },
    { name: "Rust", appId: "252490" },
    { name: "Grand Theft Auto V", appId: "271590" },
    name: "PUBG: BATTLEGROUNDS", appId: "578080" },
    { name: "Apex Legends", appId: "1172470" },
    { name: "Destiny 2", appId: "1085660" },
    { name: "Warframe", appId: "230410" },
    { name: "Path of Exile", appId: "238960" }
];

function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.sidebar-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById(`tab${tab.charAt(0).toUpperCase() + tab.slice(1)}`).classList.add('active');
    if (tab === 'accounts') renderAccounts();
    else if (tab === 'inventory') renderInventory();
    else if (tab === 'stats') renderStats();
    else if (tab === 'settings') renderSettings();
}

function getFilteredAndSortedAccounts() {
    let filtered = [...accounts];
    if (currentFilter && currentFilter.trim()) {
        const searchLower = currentFilter.toLowerCase();
        filtered = filtered.filter(acc =>
            acc.Login.toLowerCase().includes(searchLower) ||
            (acc.Email && acc.Email.toLowerCase().includes(searchLower)) ||
            (acc.SteamId && acc.SteamId.includes(searchLower)) ||
            (acc.Notes && acc.Notes.toLowerCase().includes(searchLower)) ||
            (acc.Proxy && acc.Proxy.toLowerCase().includes(searchLower))
        );
    }
    switch(currentSort) {
        case 'date-desc': filtered.sort((a,b) => new Date(b.CreatedAt) - new Date(a.CreatedAt)); break;
        case 'date-asc': filtered.sort((a,b) => new Date(a.CreatedAt) - new Date(b.CreatedAt)); break;
        case 'login-asc': filtered.sort((a,b) => a.Login.localeCompare(b.Login)); break;
        case 'login-desc': filtered.sort((a,b) => b.Login.localeCompare(a.Login)); break;
        case 'status': filtered.sort((a,b) => (a.Status === 'Online' ? 0 : 1) - (b.Status === 'Online' ? 0 : 1)); break;
        case 'balance': filtered.sort((a,b) => { let balA = parseFloat(a.Balance.replace(/[^0-9.-]/g, '')) || 0; let balB = parseFloat(b.Balance.replace(/[^0-9.-]/g, '')) || 0; return balB - balA; }); break;
    }
    return filtered;
}

function exportData() { const blob = new Blob([JSON.stringify(accounts, null, 2)], {type: 'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `asf_backup_${new Date().toISOString().slice(0,19)}.json`; a.click(); URL.revokeObjectURL(blob); showToast('Экспорт выполнен'); }
function importData() { const input = document.createElement('input'); input.type = 'file'; input.accept = '.json'; input.onchange = e => { const file = e.target.files[0]; const reader = new FileReader(); reader.onload = ev => { try { const imported = JSON.parse(ev.target.result); if (Array.isArray(imported)) { accounts = imported; window.chrome.webview.postMessage(JSON.stringify({ action: "saveAccounts", data: JSON.stringify(accounts) })); renderAccounts(); showToast(`Импортировано ${accounts.length} аккаунтов`); } } catch { showToast('Ошибка импорта'); } }; reader.readAsText(file); }; input.click(); }

function addNewAccount() { currentEditId = null; document.getElementById('editTitle').innerHTML = 'Новый аккаунт'; clearEditForm(); document.getElementById('editModal').classList.remove('hidden'); }
function editAccount(id) { const acc = accounts.find(a => a.Id === id); if (!acc) return; currentEditId = id; document.getElementById('editTitle').innerHTML = `Редактирование: ${acc.Login}`; document.getElementById('editLogin').value = acc.Login || ''; document.getElementById('editPassword').value = acc.Password || ''; document.getElementById('editSteamId').value = acc.SteamId || ''; document.getElementById('editBalance').value = acc.Balance || '0 ₽'; document.getElementById('editEmail').value = acc.Email || ''; document.getElementById('editEmailPass').value = acc.EmailPass || ''; document.getElementById('editProxy').value = acc.Proxy || ''; document.getElementById('editPin').value = acc.Pin || ''; document.getElementById('editMaFile').value = acc.MaFile || ''; document.getElementById('editNotes').value = acc.Notes || ''; document.getElementById('editModal').classList.remove('hidden'); }
function clearEditForm() { document.getElementById('editLogin').value = `acc_${Date.now().toString().slice(-6)}`; document.getElementById('editPassword').value = ''; document.getElementById('editSteamId').value = ''; document.getElementById('editBalance').value = '0 ₽'; document.getElementById('editEmail').value = ''; document.getElementById('editEmailPass').value = ''; document.getElementById('editProxy').value = ''; document.getElementById('editPin').value = ''; document.getElementById('editMaFile').value = ''; document.getElementById('editNotes').value = ''; }
function saveEditedAccount() { const data = { Id: currentEditId || Date.now().toString(), Login: document.getElementById('editLogin').value.trim(), Password: document.getElementById('editPassword').value, SteamId: document.getElementById('editSteamId').value, Email: document.getElementById('editEmail').value, EmailPass: document.getElementById('editEmailPass').value, Proxy: document.getElementById('editProxy').value, Pin: document.getElementById('editPin').value, MaFile: document.getElementById('editMaFile').value, Notes: document.getElementById('editNotes').value, Status: currentEditId ? (accounts.find(a => a.Id === currentEditId)?.Status || "Offline") : "Offline", Balance: document.getElementById('editBalance').value || "0 ₽", CreatedAt: currentEditId ? (accounts.find(a => a.Id === currentEditId)?.CreatedAt || new Date().toISOString()) : new Date().toISOString(), LastLogin: currentEditId ? (accounts.find(a => a.Id === currentEditId)?.LastLogin || "") : "", CardsRemaining: 0, GamesCount: 0 }; if (!data.Login) { showToast('Логин обязателен'); return; } if (currentEditId) { const index = accounts.findIndex(a => a.Id === currentEditId); if (index > -1) accounts[index] = data; } else { accounts.unshift(data); } window.chrome.webview.postMessage(JSON.stringify({ action: "saveAccounts", data: JSON.stringify(accounts) })); closeEditModal(); renderAccounts(); showToast('Аккаунт сохранён'); }
function deleteAccount(id) { if (confirm('Удалить аккаунт навсегда?')) { window.chrome.webview.postMessage(JSON.stringify({ action: "deleteAccount", data: id })); accounts = accounts.filter(a => a.Id !== id); selectedAccountsForMass.delete(id); renderAccounts(); showToast('Аккаунт удалён'); } }
function runASF(login) { window.chrome.webview.postMessage(JSON.stringify({ action: "runASF", data: login })); }
function copyToClipboard(text) { if (!text || text === '—') { showToast('Нет данных для копирования'); return; } window.chrome.webview.postMessage(JSON.stringify({ action: "copyToClipboard", data: text })); showToast('Скопировано в буфер обмена!'); }
function showToast(msg) { const toast = document.createElement('div'); toast.className = 'toast'; toast.innerHTML = `<i class="fas fa-check-circle"></i> ${msg}`; document.body.appendChild(toast); setTimeout(() => toast.remove(), 3000); }
function closeDetailModal() { document.getElementById('detailModal').classList.add('hidden'); currentDetailAccount = null; }
function closeEditModal() { document.getElementById('editModal').classList.add('hidden'); currentEditId = null; }
function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }
function toggleMassSelect(id) { if (selectedAccountsForMass.has(id)) selectedAccountsForMass.delete(id); else selectedAccountsForMass.add(id); updateMassSelectUI(); renderAccounts(); }
function updateMassSelectUI() { document.getElementById('selectedCount').innerText = selectedAccountsForMass.size; }
function showMassEditModal() { if (!selectedAccountsForMass.size) { showToast('Сначала выберите аккаунты'); return; } document.getElementById('massEditModal').classList.remove('hidden'); }
function closeMassEditModal() { document.getElementById('massEditModal').classList.add('hidden'); document.getElementById('massEditValue').value = ''; }
function applyMassEdit() { const field = document.getElementById('massEditField').value; const value = document.getElementById('massEditValue').value; if (!value) { showToast('Введите значение для изменения'); return; } const ids = Array.from(selectedAccountsForMass); window.chrome.webview.postMessage(JSON.stringify({ action: "massUpdate", data: JSON.stringify({ AccountIds: ids, Fields: { [field]: value } }) })); closeMassEditModal(); selectedAccountsForMass.clear(); updateMassSelectUI(); showToast(`Обновлено ${ids.length} аккаунтов`); }
function renderInventoryResult(data) { if (!data?.data?.success || !data.data.assets?.length) { document.getElementById('inventoryResult').innerHTML = '<div class="text-center py-16 text-gray-500"><i class="fas fa-box-open text-5xl mb-3 block"></i>Нет предметов или профиль приватный</div>'; return; } const gameName = games.find(g => g.appId === data.appId)?.name || `Игра ${data.appId}`; let html = `<h3 class="text-xl font-bold mb-4 text-white"><i class="fab fa-steam text-[#00b4ff]"></i> ${gameName}</h3><div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">`; data.data.assets.forEach(item => { const desc = data.data.descriptions?.find(d => d.classid === item.classid); if (desc) { html += `<div class="inventory-item"><img src="https://steamcommunity.com/economy/image/${desc.icon_url}" class="w-20 h-20 mx-auto mb-2 rounded"><p class="text-xs font-semibold text-white truncate">${escapeHtml(desc.name.substring(0, 30))}</p><p class="text-xs text-emerald-400 font-bold mt-1">x${item.amount}</p></div>`; } }); html += `</div>`; document.getElementById('inventoryResult').innerHTML = html; }

window.receiveFromCSharp = function(msg) {
    if (msg.type === "accounts") { accounts = msg.data || []; if (currentTab === 'accounts') renderAccounts(); if (currentTab === 'stats') renderStats(); document.getElementById('accountCount').innerHTML = `${accounts.length} аккаунтов`; }
    else if (msg.type === "inventoryData") renderInventoryResult(msg.data);
    else if (msg.type === "inventoryError") document.getElementById('inventoryResult').innerHTML = `<div class="text-center py-16 text-red-400"><i class="fas fa-exclamation-triangle text-5xl mb-3 block"></i>${msg.data}</div>`;
    else if (msg.type === "asfStarted") { showToast(msg.data); if (currentTab === 'accounts') renderAccounts(); if (currentTab === 'stats') renderStats(); }
    else if (msg.type === "asfError") showToast(msg.data);
    else if (msg.type === "hotkey") { if (msg.data === 'new') addNewAccount(); else if (msg.data === 'search') document.getElementById('searchInput')?.focus(); }
    else if (msg.type === "massUpdateComplete") { showToast(`Обновлено ${msg.data.count} аккаунтов`); renderAccounts(); }
};

window.onload = () => { window.chrome.webview.postMessage(JSON.stringify({ action: "getAccounts" })); switchTab('accounts'); };
</script>
