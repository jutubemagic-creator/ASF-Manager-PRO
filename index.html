<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <title>ASF Manager PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="bg-[#0a0a0f] text-gray-100 min-h-screen">
    <div class="flex h-screen">
        <!-- Сайдбар -->
        <div class="w-72 bg-[#111827] border-r border-gray-800 flex flex-col">
            <div class="p-6 border-b border-gray-800">
                <h1 class="text-3xl font-bold flex items-center gap-3">
                    <i class="fas fa-robot text-[#00b4ff]"></i> ASF PRO
                </h1>
                <p class="text-gray-500 text-sm mt-1">Управление аккаунтами</p>
            </div>
            
            <nav class="flex-1 p-4 space-y-2">
                <button onclick="switchTab(0)" class="tab-btn active w-full text-left px-4 py-3 rounded-2xl flex items-center gap-3 hover:bg-gray-800">
                    <i class="fas fa-users"></i> Аккаунты
                </button>
                <button onclick="switchTab(1)" class="tab-btn w-full text-left px-4 py-3 rounded-2xl flex items-center gap-3 hover:bg-gray-800">
                    <i class="fas fa-box"></i> Инвентарь
                </button>
                <button onclick="switchTab(2)" class="tab-btn w-full text-left px-4 py-3 rounded-2xl flex items-center gap-3 hover:bg-gray-800">
                    <i class="fas fa-globe"></i> Прокси
                </button>
                <button onclick="switchTab(3)" class="tab-btn w-full text-left px-4 py-3 rounded-2xl flex items-center gap-3 hover:bg-gray-800">
                    <i class="fas fa-steam-symbol"></i> ASF
                </button>
            </nav>
        </div>

        <!-- Основная область -->
        <div class="flex-1 overflow-auto" id="mainContent">
            <!-- Заполняется JS -->
        </div>
    </div>

    <script>
    let accounts = [];

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active', 'bg-gray-800'));
        document.querySelectorAll('.tab-btn')[tab].classList.add('active', 'bg-gray-800');
        
        if (tab === 0) renderAccounts();
    }

    function renderAccounts() {
        let html = `
        <div class="p-8">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-4xl font-semibold">Аккаунты (${accounts.length})</h2>
                <button onclick="addAccount()" class="bg-[#00b4ff] hover:bg-[#0099ff] px-6 py-3 rounded-2xl font-medium flex items-center gap-2">
                    <i class="fas fa-plus"></i> Добавить аккаунт
                </button>
            </div>
            
            <div class="bg-[#111827] rounded-3xl overflow-hidden">
                <table class="w-full">
                    <thead class="border-b border-gray-800">
                        <tr class="text-left text-gray-400 text-sm">
                            <th class="p-5">Логин</th>
                            <th class="p-5">Статус</th>
                            <th class="p-5">Прокси</th>
                            <th class="p-5">Баланс</th>
                            <th class="p-5 text-right">Действия</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>`;
        
        document.getElementById('mainContent').innerHTML = html;
        renderTableRows();
    }

    function renderTableRows() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = accounts.map(acc => `
            <tr class="border-b border-gray-800 hover:bg-gray-900 transition">
                <td class="p-5 font-medium">${acc.Login}</td>
                <td class="p-5"><span class="px-3 py-1 rounded-full text-xs ${acc.Status === 'Online' ? 'bg-green-500/20 text-green-400' : 'bg-gray-500/20 text-gray-400'}">${acc.Status}</span></td>
                <td class="p-5 text-gray-400">${acc.Proxy || '—'}</td>
                <td class="p-5 font-mono">${acc.Balance}</td>
                <td class="p-5 text-right space-x-2">
                    <button onclick="runAccount('${acc.Id}')" class="px-4 py-2 bg-green-600 hover:bg-green-500 rounded-xl text-sm">Запустить</button>
                    <button onclick="openBrowser('${acc.Id}')" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 rounded-xl text-sm">Браузер</button>
                    <button onclick="editAccount('${acc.Id}')" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-xl text-sm">Ред.</button>
                </td>
            </tr>
        `).join('');
    }

    function addAccount() {
        const newAcc = {
            Id: crypto.randomUUID(),
            Login: "new_account_" + Date.now().toString().slice(-4),
            Password: "",
            Email: "",
            EmailPass: "",
            SteamGuard: "",
            MaFile: "",
            Proxy: "",
            Status: "Offline",
            Balance: "0 ₽",
            CreatedAt: new Date().toISOString(),
            UpdatedAt: new Date().toISOString()
        };
        accounts.push(newAcc);
        saveToCSharp();
        renderAccounts();
    }

    function runAccount(id) {
        window.chrome.webview.postMessage(JSON.stringify({ action: "runASF", data: id }));
    }

    function openBrowser(id) {
        window.chrome.webview.postMessage(JSON.stringify({ action: "openBrowser", data: id }));
    }

    function editAccount(id) {
        alert("Редактирование аккаунта — будет реализовано в следующей версии");
    }

    function saveToCSharp() {
        window.chrome.webview.postMessage(JSON.stringify({ action: "saveAccounts", data: accounts }));
    }

    // Получение данных из C#
    window.receiveFromCSharp = function(msg) {
        if (msg.type === "accounts") {
            accounts = msg.data || [];
            renderAccounts();
        }
    };

    // Инициализация
    window.onload = () => {
        window.chrome.webview.postMessage(JSON.stringify({ action: "getAccounts" }));
    };
    </script>
</body>
</html>
