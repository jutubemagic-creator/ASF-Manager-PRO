<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <title>ASF Manager PRO v2.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .glass { background: rgba(255,255,255,0.09); backdrop-filter: blur(24px); }
        .card:hover { transform: translateY(-8px); }
    </style>
</head>
<body class="bg-[#0a0a0f] text-gray-100">

    <div class="flex h-screen">
        <!-- Сайдбар -->
        <div class="w-72 bg-[#111827] border-r border-gray-800 p-6">
            <h1 class="text-3xl font-bold mb-8 flex items-center gap-3">
                <span class="text-[#00b4ff]">ASF</span> PRO
            </h1>
            <button onclick="addNewAccount()" class="w-full bg-[#00b4ff] text-black py-4 rounded-2xl font-semibold flex items-center justify-center gap-2">
                <i class="fas fa-plus"></i> Новый аккаунт
            </button>
        </div>

        <!-- Контент -->
        <div class="flex-1 p-8 overflow-auto" id="mainContent"></div>
    </div>

    <!-- Модалка -->
    <div id="modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
        <div class="glass w-[620px] rounded-3xl p-8">
            <h2 id="modalTitle" class="text-2xl font-bold mb-6">Новый аккаунт</h2>
            
            <div class="space-y-4">
                <input id="login" placeholder="Логин" class="w-full bg-[#1f2937] rounded-2xl px-5 py-4">
                <input id="password" type="password" placeholder="Пароль" class="w-full bg-[#1f2937] rounded-2xl px-5 py-4">
                <input id="email" placeholder="Почта" class="w-full bg-[#1f2937] rounded-2xl px-5 py-4">
                <input id="proxy" placeholder="Прокси" class="w-full bg-[#1f2937] rounded-2xl px-5 py-4">
            </div>

            <div class="mt-8 flex gap-4">
                <!-- Главная кнопка с прямым вызовом -->
                <button onclick="saveAccount()" 
                        class="flex-1 bg-[#00b4ff] hover:bg-[#00d4ff] text-black py-5 rounded-2xl font-bold text-xl">
                    Сохранить аккаунт
                </button>
                <button onclick="closeModal()" class="flex-1 bg-gray-700 py-5 rounded-2xl font-bold text-xl">Отмена</button>
            </div>
        </div>
    </div>

    <script>
    let accounts = [];

    function renderAccounts() {
        let html = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">`;
        accounts.forEach(acc => {
            html += `
            <div class="glass rounded-3xl p-6">
                <h3 class="text-xl font-semibold">${acc.Login}</h3>
                <p class="text-gray-400">${acc.Email || '—'}</p>
                <button onclick="editAccount('${acc.Id}')" class="mt-4 text-sm text-[#00b4ff]">Редактировать</button>
            </div>`;
        });
        html += `</div>`;
        document.getElementById('mainContent').innerHTML = html;
    }

    function addNewAccount() {
        document.getElementById('modalTitle').textContent = 'Новый аккаунт';
        document.getElementById('login').value = '';
        document.getElementById('password').value = '';
        document.getElementById('email').value = '';
        document.getElementById('proxy').value = '';
        document.getElementById('modal').classList.remove('hidden');
    }

    function editAccount(id) {
        alert("Редактирование пока в разработке");
    }

    function closeModal() {
        document.getElementById('modal').classList.add('hidden');
    }

    // === САМАЯ ВАЖНАЯ ФУНКЦИЯ ===
    function saveAccount() {
        const newAcc = {
            Id: crypto.randomUUID ? crypto.randomUUID() : 'acc-' + Date.now(),
            Login: document.getElementById('login').value.trim() || "НовыйАккаунт",
            Password: document.getElementById('password').value,
            Email: document.getElementById('email').value,
            Proxy: document.getElementById('proxy').value,
            Status: "Offline",
            Balance: "0 ₽",
            CreatedAt: new Date().toISOString()
        };

        accounts.unshift(newAcc);
        
        // Отправляем в C#
        try {
            window.chrome.webview.postMessage(JSON.stringify({
                action: "saveAccounts",
                data: accounts
            }));
            alert("✅ Аккаунт сохранён!");
            closeModal();
            renderAccounts();
        } catch (e) {
            alert("Ошибка отправки: " + e.message);
        }
    }

    window.receiveFromCSharp = function(msg) {
        if (msg.type === "accounts") {
            accounts = msg.data || [];
            renderAccounts();
        }
    };

    // Загрузка при старте
    window.onload = function() {
        if (window.chrome && window.chrome.webview) {
            window.chrome.webview.postMessage(JSON.stringify({ action: "getAccounts" }));
        } else {
            console.log("WebView2 не обнаружен");
        }
    };
    </script>
</body>
</html>
