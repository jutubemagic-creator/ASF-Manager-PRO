<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <title>ASF Manager PRO v3.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        
        * {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #0f0f1a 100%);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes slideIn {
            from { transform: translateX(-100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(0.98); }
        }
        
        .glass {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        /* Улучшенные карточки */
        .account-card {
            animation: fadeIn 0.4s ease-out;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            background: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.02) 100%);
            border: 1px solid rgba(255,255,255,0.08);
            position: relative;
            overflow: hidden;
            border-radius: 20px;
        }
        
        .account-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0,180,255,0.08), transparent);
            transition: left 0.5s;
        }
        
        .account-card:hover::before {
            left: 100%;
        }
        
        .account-card:hover {
            transform: translateY(-6px) scale(1.01);
            border-color: rgba(0,180,255,0.5);
            box-shadow: 0 25px 40px -12px rgba(0,180,255,0.25);
        }
        
        /* Бейдж статуса */
        .status-badge {
            transition: all 0.3s;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        
        .account-card:hover .status-badge {
            transform: scale(1.05);
        }
        
        /* Аватар */
        .account-avatar {
            transition: all 0.3s;
            width: 52px;
            height: 52px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 800;
            box-shadow: 0 8px 20px -5px rgba(0,0,0,0.3);
        }
        
        .account-card:hover .account-avatar {
            transform: scale(1.05) rotate(3deg);
        }
        
        /* Инфо-блоки */
        .info-chip {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 8px 10px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .account-card:hover .info-chip {
            background: rgba(0,180,255,0.1);
        }
        
        /* Кнопки действий */
        .action-btn {
            transition: all 0.2s;
            border-radius: 12px;
            font-weight: 600;
            font-size: 13px;
            padding: 8px 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .action-btn:hover {
            transform: translateY(-2px);
        }
        
        .detail-row {
            display: flex;
            padding: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            align-items: flex-start;
            transition: all 0.2s;
            border-radius: 12px;
            margin: 4px 0;
        }
        
        .detail-row:hover {
            background: rgba(0,180,255,0.08);
            transform: translateX(5px);
        }
        
        .detail-label {
            width: 180px;
            font-weight: 600;
            color: #9ca3af;
            flex-shrink: 0;
            font-size: 14px;
        }
        
        .detail-value {
            flex: 1;
            word-break: break-word;
            user-select: text;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 13px;
        }
        
        .copy-btn, .view-btn {
            cursor: pointer;
            padding: 6px 12px;
            background: rgba(0,180,255,0.15);
            border-radius: 10px;
            font-size: 11px;
            margin-left: 10px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
        }
        
        .copy-btn:hover, .view-btn:hover {
            background: rgba(0,180,255,0.4);
            transform: scale(1.05);
        }
        
        .inventory-item {
            transition: all 0.2s;
            cursor: pointer;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 12px;
        }
        
        .inventory-item:hover {
            transform: scale(1.05);
            background: rgba(0,180,255,0.15);
            box-shadow: 0 10px 20px -5px rgba(0,0,0,0.3);
        }
        
        .tab-btn {
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: #00b4ff;
            transition: all 0.3s;
            transform: translateX(-50%);
        }
        
        .tab-btn:hover::after {
            width: 80%;
        }
        
        .tab-active {
            background: linear-gradient(135deg, #00b4ff 0%, #0099cc 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(0,180,255,0.4);
        }
        
        .tab-active::after {
            width: 80%;
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #00b4ff 0%, #0099cc 100%);
            color: white;
            padding: 14px 28px;
            border-radius: 50px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            font-weight: 700;
            box-shadow: 0 10px 25px -5px rgba(0,180,255,0.5);
            backdrop-filter: blur(10px);
        }
        
        .search-input {
            transition: all 0.3s;
            background: rgba(31,41,55,0.8);
            border: 1px solid rgba(55,65,81,0.8);
            backdrop-filter: blur(5px);
        }
        
        .search-input:focus {
            outline: none;
            border-color: #00b4ff;
            box-shadow: 0 0 0 3px rgba(0,180,255,0.2);
            background: rgba(31,41,55,1);
        }
        
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(31,41,55,0.5);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #00b4ff 0%, #0099cc 100%);
            border-radius: 10px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, rgba(31,41,55,0.8) 0%, rgba(17,24,39,0.8) 100%);
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            border-radius: 20px;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0,180,255,0.3);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #00b4ff 0%, #0099cc 100%);
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0,180,255,0.5);
        }
        
        input[type="checkbox"] {
            cursor: pointer;
            width: 18px;
            height: 18px;
            accent-color: #00b4ff;
            transition: all 0.2s;
        }
        
        .modal-content {
            animation: fadeIn 0.3s ease;
        }
    </style>
</head>
<body class="text-gray-100">
<div class="flex h-screen">
    <!-- Сайдбар -->
    <div class="w-80 glass border-r border-gray-800/50 p-6 flex flex-col" style="animation: slideIn 0.5s ease;">
        <div class="flex items-center gap-3 mb-8">
            <div class="w-14 h-14 bg-gradient-to-br from-[#00b4ff] to-cyan-400 rounded-2xl flex items-center justify-center text-4xl shadow-lg transform transition hover:scale-110">
                🎮
            </div>
            <div>
                <h1 class="text-2xl font-black tracking-tighter bg-gradient-to-r from-[#00b4ff] to-cyan-400 bg-clip-text text-transparent">

        <button onclick="addNewAccount()" class="btn-primary w-full py-3.5 rounded-xl font-bold flex items-center justify-center gap-2 transition mb-3 shadow-lg">

        <div class="mt-auto pt-6 text-xs text-gray-500 border-t border-gray-800/50">
            <i class="fas fa-database"></i> Локальное хранение<br>
            <span id="accountCount" class="font-bold text-[#00b4ff]">0 аккаунтов</span>
        </div>
    </div>
    
    <!-- Основная область -->
    <div class="flex-1 p-6 overflow-auto" id="mainContent"></div>
</div>

<!-- Модальные окна -->
<div id="detailModal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-sm flex items-center justify-center z-50 p-4">
    <div class="glass w-[1000px] rounded-2xl p-6 max-h-[85vh] overflow-auto modal-content border border-[#00b4ff]/20">
        <div class="flex justify-between items-center mb-5 pb-3 border-b border-gray-700">

        <div class="flex gap-3 pt-3 border-t border-gray-700">

            <button onclick="closeDetailModal()" class="flex-1 py-3 bg-gray-700 font-bold rounded-xl transition hover:scale-105 shadow-lg">
                Закрыть
            </button>
        </div>

</div>

<div id="editModal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-sm flex items-center justify-center z-50 p-4">
    <div class="glass w-[900px] rounded-2xl p-6 max-h-[85vh] overflow-auto modal-content border border-[#00b4ff]/20">
        <h2 id="editTitle" class="text-2xl font-bold mb-5 bg-gradient-to-r from-[#00b4ff] to-cyan-400 bg-clip-text text-transparent">Редактирование</h2>
        <div class="grid grid-cols-2 gap-4">
            <div><label class="text-gray-400 text-sm block mb-2 font-semibold"><i class="fas fa-sign-in-alt text-[#00b4ff] mr-2"></i>Логин Steam *</label><input id="editLogin" class="w-full bg-[#1f2937] rounded-xl px-4 py-3 border border-gray-700 focus:border-[#00b4ff] transition"></div>
            <div><label class="text-gray-400 text-sm block mb-2 font-semibold"><i class="fas fa-lock text-[#00b4ff] mr-2"></i>Пароль Steam</label><input id="editPassword" type="password" class="w-full bg-[#1f2937] rounded-xl px-4 py-3 border border-gray-700 focus:border-[#00b4ff] transition"></div>
            <div><label class="text-gray-400 text-sm block mb-2 font-semibold"><i class="fab fa-steam text-[#00b4ff] mr-2"></i>Steam ID</label><input id="editSteamId" class="w-full bg-[#1f2937] rounded-xl px-4 py-3 border border-gray-700 focus:border-[#00b4ff] transition" placeholder="7656119..."></div>
            <div><label class="text-gray-400 text-sm block mb-2 font-semibold"><i class="fas fa-coins text-[#00b4ff] mr-2"></i>Баланс</label><input id="editBalance" class="w-full bg-[#1f2937] rounded-xl px-4 py-3 border border-gray-700 focus:border-[#00b4ff] transition" placeholder="0 ₽"></div>
            <div><label class="text-gray-400 text-sm block mb-2 font-semibold"><i class="fas fa-envelope text-[#00b4ff] mr-2"></i>Почта</label><input id="editEmail" class="w-full bg-[#1f2937] rounded-xl px-4 py-3 border border-gray-700 focus:border-[#00b4ff] transition"></div>
            <div><label class="text-gray-400 text-sm block mb-2 font-semibold"><i class="fas fa-key text-[#00b4ff] mr-2"></i>Пароль почты</label><input id="editEmailPass" type="password" class="w-full bg-[#1f2937] rounded-xl px-4 py-3 border border-gray-700 focus:border-[#00b4ff] transition"></div>
            <div><label class="text-gray-400 text-sm block mb-2 font-semibold"><i class="fas fa-network-wired text-[#00b4ff] mr-2"></i>Прокси</label><input id="editProxy" class="w-full bg-[#1f2937] rounded-xl px-4 py-3 border border-gray-700 focus:border-[#00b4ff] transition" placeholder="ip:port"></div>
            <div><label class="text-gray-400 text-sm block mb-2 font-semibold"><i class="fas fa-digit text-[#00b4ff] mr-2"></i>PIN-код</label><input id="editPin" class="w-full bg-[#1f2937] rounded-xl px-4 py-3 border border-gray-700 focus:border-[#00b4ff] transition"></div>
            <div class="col-span-2"><label class="text-gray-400 text-sm block mb-2 font-semibold"><i class="fas fa-file-code text-[#00b4ff] mr-2"></i>MaFile (JSON)</label><textarea id="editMaFile" rows="3" class="w-full bg-[#1f2937] rounded-xl px-4 py-3 font-mono text-xs border border-gray-700 focus:border-[#00b4ff] transition"></textarea></div>

        </div>
        <div class="flex gap-3 mt-6">
            <button onclick="saveEditedAccount()" class="flex-1 py-3 bg-gradient-to-r from-[#00b4ff] to-cyan-500 text-black font-bold rounded-xl transition hover:scale-105 shadow-lg"><i class="fas fa-save"></i> Сохранить</button>

<div id="massEditModal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-sm flex items-center justify-center z-50 p-4">
    <div class="glass w-[550px] rounded-2xl p-6 modal-content border border-[#00b4ff]/20">
        <h2 class="text-2xl font-bold mb-5 bg-gradient-to-r from-[#00b4ff] to-cyan-400 bg-clip-text text-transparent"><i class="fas fa-check-double"></i> Массовое редактирование</h2>
        <div class="mb-4"><label class="text-gray-400 text-sm block mb-2 font-semibold">Поле для изменения:</label><select id="massEditField" class="w-full bg-[#1f2937] rounded-xl px-4 py-3 border border-gray-700 focus:border-[#00b4ff] transition"><option value="Proxy">🌐 Прокси</option><option value="Notes">📝 Заметки</option><option value="Status">🟢 Статус</option></select></div>
        <div class="mb-6"><label class="text-gray-400 text-sm block mb-2 font-semibold">Новое значение:</label><input type="text" id="massEditValue" class="w-full bg-[#1f2937] rounded-xl px-4 py-3 border border-gray-700 focus:border-[#00b4ff] transition" placeholder="Введите значение..."></div>
        <div class="flex gap-3"><button onclick="applyMassEdit()" class="flex-1 py-3 bg-gradient-to-r from-[#00b4ff] to-cyan-500 text-black font-bold rounded-xl transition hover:scale-105 shadow-lg"><i class="fas fa-save"></i> Применить</button><button onclick="closeMassEditModal()" class="flex-1 py-3 bg-gray-700 font-bold rounded-xl transition hover:scale-105 shadow-lg">Отмена</button></div>
    </div>
</div>

<script>
let accounts = [];
let currentTab = 'accounts';
let currentDetailAccount = null;
let currentEditId = null;
let currentFilter = '';
let currentSort = 'date-desc';
let showPasswords = {};
let selectedAccountsForMass = new Set();
let searchTimeout = null;

const games = [
    { name: "Counter-Strike 2", appId: "730" },
    { name: "Dota 2", appId: "570" },
    { name: "Team Fortress 2", appId: "440" },
    { name: "Rust", appId: "252490" },
    { name: "Grand Theft Auto V", appId: "271590" },
    { name: "PUBG", appId: "578080" },
    { name: "Apex Legends", appId: "1172470" },
    { name: "Destiny 2", appId: "1085660" },
    { name: "Warframe", appId: "230410" },
    { name: "Path of Exile", appId: "238960" }
];

const sortNames = {
    'date-desc': 'сначала новые',
    'date-asc': 'сначала старыe',
    'login-asc': 'логин А-Я',
    'login-desc': 'логин Я-А',
    'status': 'по статусу',
    'balance': 'по балансу'
};

function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('tab-active'));
    document.getElementById(`tab${tab.charAt(0).toUpperCase() + tab.slice(1)}`).classList.add('tab-active');
    if (tab === 'accounts') renderAccounts();
    else if (tab === 'inventory') renderInventory();
    else if (tab === 'stats') renderStats();
    else if (tab === 'settings') renderSettings();
}

function getFilteredAndSortedAccounts() {
    let filtered = [...accounts];
    if (currentFilter && currentFilter.trim()) {
        const searchLower = currentFilter.toLowerCase();
        filtered = filtered.filter(acc =>
            acc.Login.toLowerCase().includes(searchLower) ||
            (acc.Email && acc.Email.toLowerCase().includes(searchLower)) ||
            (acc.SteamId && acc.SteamId.includes(searchLower)) ||
            (acc.Notes && acc.Notes.toLowerCase().includes(searchLower)) ||
            (acc.Proxy && acc.Proxy.toLowerCase().includes(searchLower))
        );
    }
    switch(currentSort) {
        case 'date-desc': filtered.sort((a,b) => new Date(b.CreatedAt) - new Date(a.CreatedAt)); break;
        case 'date-asc': filtered.sort((a,b) => new Date(a.CreatedAt) - new Date(b.CreatedAt)); break;
        case 'login-asc': filtered.sort((a,b) => a.Login.localeCompare(b.Login)); break;
        case 'login-desc': filtered.sort((a,b) => b.Login.localeCompare(a.Login)); break;
        case 'status': filtered.sort((a,b) => (a.Status === 'Online' ? 0 : 1) - (b.Status === 'Online' ? 0 : 1)); break;
        case 'balance': filtered.sort((a,b) => { let balA = parseFloat(a.Balance.replace(/[^0-9.-]/g, '')) || 0; let balB = parseFloat(b.Balance.replace(/[^0-9.-]/g, '')) || 0; return balB - balA; }); break;
    }
    return filtered;
}

function renderAccounts() {
    const filtered = getFilteredAndSortedAccounts();
   
    let html = `
        <div class="mb-6 space-y-4">
            <div class="flex gap-4 flex-wrap items-center">
                <div class="flex-1 min-w-[300px]">
                    <div class="relative group">
                        <i class="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400 group-focus-within:text-[#00b4ff] transition"></i>
                        <input type="text" id="searchInput" placeholder="🔍 Поиск по логину, email, Steam ID, заметкам, прокси..."
                               class="search-input w-full bg-[#1f2937]/80 rounded-xl pl-12 pr-4 py-3.5 border border-gray-700 focus:border-[#00b4ff] transition"
                               onkeyup="updateSearch()">
                    </div>
                </div>
                <select id="sortSelect" onchange="updateSort()" class="bg-[#1f2937] rounded-xl px-4 py-3.5 border border-gray-700 focus:border-[#00b4ff] transition cursor-pointer">
                    <option value="date-desc">📅 Сначала новые</option>
                    <option value="date-asc">📅 Сначала старые</option>
                    <option value="login-asc">🔤 Логин (А-Я)</option>
                    <option value="login-desc">🔤 Логин (Я-А)</option>
                    <option value="status">🟢 По статусу</option>
                    <option value="balance">💰 По балансу</option>
                </select>

function updateSearchDebounced() {
    if (searchTimeout) clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
        currentFilter = document.getElementById('searchInput')?.value || '';
        renderAccounts();
    }, 300);
}

function updateSearch() { updateSearchDebounced(); }
function updateSort() { currentSort = document.getElementById('sortSelect')?.value || 'date-desc'; renderAccounts(); }
function clearSearch() { currentFilter = ''; const searchInput = document.getElementById('searchInput'); if (searchInput) searchInput.value = ''; renderAccounts(); }

        <div class="detail-row"><div class="detail-label"><i class="fas fa-network-wired w-5 text-[#00b4ff]"></i> Прокси:</div><div class="detail-value">${escapeHtml(acc.Proxy) || '—'} <span class="copy-btn" onclick="copyToClipboard('${escapeHtml(acc.Proxy)}')"><i class="fas fa-copy"></i> Копировать</span></div></div>

function togglePassword(accountId) { showPasswords[accountId] = !showPasswords[accountId]; showAccountDetail(accountId); }
function deleteFromDetail() { if (currentDetailAccount && confirm(`Удалить аккаунт "${currentDetailAccount.Login}" навсегда?`)) { deleteAccount(currentDetailAccount.Id); closeDetailModal(); } }
function deleteAllAccounts() { if (confirm("⚠️ ВНИМАНИЕ! Вы уверены, что хотите удалить ВСЕ аккаунты?")) { window.chrome.webview.postMessage(JSON.stringify({ action: "deleteAllAccounts", data: "" })); accounts = []; renderAccounts(); showToast('Все аккаунты удалены'); } }
function runASFForAll() { if (accounts.length === 0) { showToast('Нет аккаунтов для запуска'); return; } if (confirm(`Запустить ASF для всех ${accounts.length} аккаунтов?`)) { window.chrome.webview.postMessage(JSON.stringify({ action: "runASFForAll", data: "" })); } }
function exportData() { const dataStr = JSON.stringify(accounts, null, 2); const blob = new Blob([dataStr], {type: 'application/json'}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `asf_backup_${new Date().toISOString().slice(0,19)}.json`; a.click(); URL.revokeObjectURL(url); showToast('Экспорт выполнен'); }
function importData() { const input = document.createElement('input'); input.type = 'file'; input.accept = '.json'; input.onchange = e => { const file = e.target.files[0]; const reader = new FileReader(); reader.onload = ev => { try { const imported = JSON.parse(ev.target.result); if (Array.isArray(imported)) { accounts = imported; window.chrome.webview.postMessage(JSON.stringify({ action: "saveAccounts", data: JSON.stringify(accounts) })); showToast(`Импортировано ${accounts.length} аккаунтов`); renderAccounts(); } } catch { showToast('Ошибка импорта'); } }; reader.readAsText(file); }; input.click(); }
function editFromDetail() { if (currentDetailAccount) { closeDetailModal(); editAccount(currentDetailAccount.Id); } }
function runASFFromDetail() { if (currentDetailAccount) { runASF(currentDetailAccount.Login); showToast(`Запуск ASF для ${currentDetailAccount.Login}`); } }
function addNewAccount() { currentEditId = null; document.getElementById('editTitle').innerHTML = '➕ Новый аккаунт'; clearEditForm(); document.getElementById('editModal').classList.remove('hidden'); }
function editAccount(id) { const acc = accounts.find(a => a.Id === id); if (!acc) return; currentEditId = id; document.getElementById('editTitle').innerHTML = `✏️ Редактирование: ${acc.Login}`; document.getElementById('editLogin').value = acc.Login || ''; document.getElementById('editPassword').value = acc.Password || ''; document.getElementById('editSteamId').value = acc.SteamId || ''; document.getElementById('editBalance').value = acc.Balance || '0 ₽'; document.getElementById('editEmail').value = acc.Email || ''; document.getElementById('editEmailPass').value = acc.EmailPass || ''; document.getElementById('editProxy').value = acc.Proxy || ''; document.getElementById('editPin').value = acc.Pin || ''; document.getElementById('editMaFile').value = acc.MaFile || ''; document.getElementById('editNotes').value = acc.Notes || ''; document.getElementById('editModal').classList.remove('hidden'); }
function clearEditForm() { document.getElementById('editLogin').value = `acc_${Date.now().toString().slice(-6)}`; document.getElementById('editPassword').value = ''; document.getElementById('editSteamId').value = ''; document.getElementById('editBalance').value = '0 ₽'; document.getElementById('editEmail').value = ''; document.getElementById('editEmailPass').value = ''; document.getElementById('editProxy').value = ''; document.getElementById('editPin').value = ''; document.getElementById('editMaFile').value = ''; document.getElementById('editNotes').value = ''; }
function saveEditedAccount() { const data = { Id: currentEditId || 'acc-' + Date.now(), Login: document.getElementById('editLogin').value.trim(), Password: document.getElementById('editPassword').value, SteamId: document.getElementById('editSteamId').value, Email: document.getElementById('editEmail').value, EmailPass: document.getElementById('editEmailPass').value, Proxy: document.getElementById('editProxy').value, Pin: document.getElementById('editPin').value, MaFile: document.getElementById('editMaFile').value, Notes: document.getElementById('editNotes').value, Status: currentEditId ? (accounts.find(a => a.Id === currentEditId)?.Status || "Offline") : "Offline", Balance: document.getElementById('editBalance').value || "0 ₽", CreatedAt: currentEditId ? (accounts.find(a => a.Id === currentEditId)?.CreatedAt || new Date().toISOString()) : new Date().toISOString(), LastLogin: currentEditId ? (accounts.find(a => a.Id === currentEditId)?.LastLogin || "") : "", CardsRemaining: 0, GamesCount: 0 }; if (!data.Login) { showToast('Логин обязателен'); return; } if (currentEditId) { const index = accounts.findIndex(a => a.Id === currentEditId); if (index > -1) accounts[index] = data; } else { accounts.unshift(data); } window.chrome.webview.postMessage(JSON.stringify({ action: "saveAccounts", data: JSON.stringify(accounts) })); closeEditModal(); renderAccounts(); showToast('Аккаунт сохранён'); }
function deleteAccount(id) { if (confirm("Удалить аккаунт?")) { window.chrome.webview.postMessage(JSON.stringify({ action: "deleteAccount", data: id })); accounts = accounts.filter(a => a.Id !== id); selectedAccountsForMass.delete(id); renderAccounts(); showToast('Аккаунт удалён'); } }
function runASF(login) { window.chrome.webview.postMessage(JSON.stringify({ action: "runASF", data: login })); }
function copyToClipboard(text) { if (!text || text === '—') { showToast('Нет данных'); return; } window.chrome.webview.postMessage(JSON.stringify({ action: "copyToClipboard", data: text })); showToast('Скопировано!'); }
function showToast(message) { let toast = document.createElement('div'); toast.className = 'toast'; toast.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`; document.body.appendChild(toast); setTimeout(() => toast.remove(), 3000); }
function closeDetailModal() { document.getElementById('detailModal').classList.add('hidden'); currentDetailAccount = null; }
function closeEditModal() { document.getElementById('editModal').classList.add('hidden'); currentEditId = null; }
function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }
function toggleMassSelect(accountId) { if (selectedAccountsForMass.has(accountId)) { selectedAccountsForMass.delete(accountId); } else { selectedAccountsForMass.add(accountId); } updateMassSelectUI(); renderAccounts(); }
function updateMassSelectUI() { const count = selectedAccountsForMass.size; const selectedSpan = document.getElementById('selectedCount'); if (selectedSpan) selectedSpan.innerText = count; const selectBtn = document.getElementById('massSelectBtn'); if (selectBtn) { if (count > 0) { selectBtn.classList.add('bg-gradient-to-r', 'from-[#00b4ff]', 'to-cyan-500'); selectBtn.classList.remove('bg-[#374151]'); } else { selectBtn.classList.remove('bg-gradient-to-r', 'from-[#00b4ff]', 'to-cyan-500'); selectBtn.classList.add('bg-[#374151]'); } } }
function showMassEditModal() { if (selectedAccountsForMass.size === 0) { showToast('Выберите аккаунты'); return; } document.getElementById('massEditModal').classList.remove('hidden'); }
function closeMassEditModal() { document.getElementById('massEditModal').classList.add('hidden'); document.getElementById('massEditValue').value = ''; }
function applyMassEdit() { const field = document.getElementById('massEditField').value; const value = document.getElementById('massEditValue').value; if (!value) { showToast('Введите значение'); return; } const accountIds = Array.from(selectedAccountsForMass); window.chrome.webview.postMessage(JSON.stringify({ action: "massUpdate", data: JSON.stringify({ AccountIds: accountIds, Fields: { [field]: value } }) })); closeMassEditModal(); selectedAccountsForMass.clear(); updateMassSelectUI(); showToast(`Обновлено ${accountIds.length} аккаунтов`); }
function receiveHotkey(action) { if (action === 'new') addNewAccount(); else if (action === 'save' && currentDetailAccount) saveEditedAccount(); else if (action === 'search') document.getElementById('searchInput')?.focus(); else if (action === 'delete' && currentDetailAccount) deleteFromDetail(); }
function renderInventoryResult(data) { if (!data?.data?.success || !data.data.assets?.length) { document.getElementById('inventoryResult').innerHTML = '<div class="text-center py-16 text-gray-400"><i class="fas fa-box-open text-5xl mb-3 block"></i>Нет предметов</div>'; return; } const gameName = games.find(g => g.appId === data.appId)?.name || `Игра ${data.appId}`; let html = `<h3 class="text-2xl font-bold mb-4"><i class="fab fa-steam text-[#00b4ff]"></i> ${gameName}</h3><div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">`; data.data.assets.forEach(item => { const desc = data.data.descriptions?.find(d => d.classid === item.classid); if (desc) { html += `<div class="inventory-item rounded-xl p-3 text-center"><img src="https://steamcommunity.com/economy/image/${desc.icon_url}" class="w-20 h-20 mx-auto mb-2 rounded"><p class="text-xs font-semibold truncate">${escapeHtml(desc.name.substring(0, 30))}</p><p class="text-xs text-emerald-400 font-bold">x${item.amount}</p></div>`; } }); html += `</div>`; document.getElementById('inventoryResult').innerHTML = html; }

window.receiveFromCSharp = function(msg) {
    if (msg.type === "accounts") { accounts = msg.data || []; if (currentTab === 'accounts') renderAccounts(); if (currentTab === 'stats') renderStats(); document.getElementById('accountCount').innerHTML = `${accounts.length} аккаунтов`; }
    else if (msg.type === "inventoryData") renderInventoryResult(msg.data);
    else if (msg.type === "inventoryError") document.getElementById('inventoryResult').innerHTML = `<div class="text-center py-16 text-red-400"><i class="fas fa-exclamation-triangle text-5xl mb-3 block"></i>${msg.data}</div>`;
    else if (msg.type === "asfStarted") { showToast(msg.data); if (currentTab === 'accounts') renderAccounts(); if (currentTab === 'stats') renderStats(); }
    else if (msg.type === "asfError") showToast(msg.data);
    else if (msg.type === "hotkey") receiveHotkey(msg.data);
    else if (msg.type === "massUpdateComplete") { showToast(`Обновлено ${msg.data.count} аккаунтов`); renderAccounts(); }
};

window.onload = () => { window.chrome.webview.postMessage(JSON.stringify({ action: "getAccounts" })); switchTab('accounts'); };
</script>
