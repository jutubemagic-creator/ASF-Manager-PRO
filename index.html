<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <title>ASF Manager PRO v2.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .glass { background: rgba(255,255,255,0.09); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.1); }
        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-4px) scale(1.03); box-shadow: 0 25px 50px -12px rgb(0 180 255 / 0.25); }
        .glow-cyan { box-shadow: 0 0 25px -5px rgb(0 180 255); }
        .toast { animation: toastIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-[#0a0a0f] text-gray-100 min-h-screen">
    <!-- Header -->
    <div class="h-16 bg-[#111827] border-b border-[#1f2937] flex items-center px-8 fixed w-full z-50 glass">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 bg-gradient-to-br from-[#00b4ff] to-[#00ffcc] rounded-2xl flex items-center justify-center text-2xl shadow-inner">🤖</div>
            <h1 class="text-3xl font-bold tracking-tighter bg-gradient-to-r from-white to-[#00b4ff] bg-clip-text text-transparent">ASF PRO</h1>
        </div>
        <div class="flex-1 max-w-md mx-12">
            <input id="searchInput" 
                   onkeyup="if(event.key==='Enter') filterAccounts()"
                   placeholder="Поиск по логину или почте..." 
                   class="w-full bg-[#1f2937] border border-gray-700 focus:border-[#00b4ff] rounded-3xl px-6 py-3 text-sm outline-none">
        </div>
        <div class="flex items-center gap-8 text-sm">
            <div class="text-right">
                <div class="text-gray-400">Аккаунтов</div>
                <div id="totalAccounts" class="text-2xl font-semibold text-white">0</div>
            </div>
            <div class="text-right">
                <div class="text-gray-400">Общий баланс</div>
                <div id="totalBalance" class="text-2xl font-semibold text-[#00ffcc]">0 ₽</div>
            </div>
            <button onclick="addNewAccount()" 
                    class="flex items-center gap-3 bg-gradient-to-r from-[#00b4ff] to-[#00ffcc] text-black font-semibold px-8 py-3 rounded-3xl hover:scale-105 transition">
                <i class="fas fa-plus"></i> Новый аккаунт
            </button>
        </div>
    </div>

    <div class="flex pt-16 h-screen">
        <!-- Сайдбар -->
        <div class="w-72 bg-[#111827] border-r border-[#1f2937] p-6 flex flex-col">
            <nav class="space-y-2">
                <button onclick="switchTab(0)" class="tab-btn active w-full flex items-center gap-4 px-5 py-4 rounded-3xl hover:bg-white/10 transition">
                    <i class="fas fa-users text-[#00b4ff]"></i>
                    <span class="font-medium">Аккаунты</span>
                </button>
                <button onclick="switchTab(1)" class="tab-btn w-full flex items-center gap-4 px-5 py-4 rounded-3xl hover:bg-white/10 transition">
                    <i class="fas fa-box"></i>
                    <span class="font-medium">Инвентарь</span>
                </button>
                <button onclick="switchTab(2)" class="tab-btn w-full flex items-center gap-4 px-5 py-4 rounded-3xl hover:bg-white/10 transition">
                    <i class="fas fa-globe"></i>
                    <span class="font-medium">Прокси</span>
                </button>
            </nav>
        </div>

        <!-- Главная область -->
        <div class="flex-1 p-8 overflow-auto" id="mainContent">
            <!-- Заполняется JS -->
        </div>
    </div>

    <!-- Модальное окно -->
    <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100]">
        <div class="glass w-[680px] rounded-3xl p-8 max-h-[90vh] overflow-auto">
            <h2 id="modalTitle" class="text-3xl font-bold mb-8">Новый аккаунт</h2>
            
            <div class="grid grid-cols-2 gap-6">
                <input id="login" placeholder="Логин Steam" class="bg-[#1f2937] border border-transparent focus:border-[#00b4ff] rounded-3xl px-6 py-5 text-lg">
                <input id="password" type="password" placeholder="Пароль Steam" class="bg-[#1f2937] border border-transparent focus:border-[#00b4ff] rounded-3xl px-6 py-5 text-lg">
                <input id="email" placeholder="Почта" class="bg-[#1f2937] border border-transparent focus:border-[#00b4ff] rounded-3xl px-6 py-5 text-lg">
                <input id="emailPass" type="password" placeholder="Пароль от почты" class="bg-[#1f2937] border border-transparent focus:border-[#00b4ff] rounded-3xl px-6 py-5 text-lg">
                <input id="proxy" placeholder="Прокси (ip:port)" class="bg-[#1f2937] border border-transparent focus:border-[#00b4ff] rounded-3xl px-6 py-5 text-lg col-span-2">
                <input id="pin" placeholder="PIN-код" class="bg-[#1f2937] border border-transparent focus:border-[#00b4ff] rounded-3xl px-6 py-5 text-lg">
                <textarea id="mafile" placeholder="Содержимое mafile (JSON)" rows="3" class="bg-[#1f2937] border border-transparent focus:border-[#00b4ff] rounded-3xl px-6 py-5 col-span-2 font-mono"></textarea>
                <textarea id="notes" placeholder="Заметки / доп. информация" rows="2" class="bg-[#1f2937] border border-transparent focus:border-[#00b4ff] rounded-3xl px-6 py-5 col-span-2"></textarea>
            </div>

            <div class="flex gap-4 mt-10">
                <button onclick="saveAccount()" class="flex-1 py-5 text-xl font-semibold bg-gradient-to-r from-[#00b4ff] to-[#00ffcc] text-black rounded-3xl hover:brightness-110">Сохранить</button>
                <button onclick="closeModal()" class="flex-1 py-5 text-xl font-semibold bg-[#1f2937] rounded-3xl">Отмена</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="hidden fixed bottom-6 right-6 bg-[#00b4ff] text-black px-6 py-4 rounded-3xl shadow-2xl flex items-center gap-3 toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastText" class="font-medium"></span>
    </div>

    <script>
    let accounts = [];
    let currentEditId = null;

    function switchTab(n) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-btn')[n].classList.add('active');
        if (n === 0) renderAccounts();
    }

    function renderAccounts(filteredAccounts = accounts) {
        const totalBalance = filteredAccounts.reduce((sum, a) => sum + parseFloat(a.Balance || 0), 0);
        document.getElementById('totalAccounts').textContent = filteredAccounts.length;
        document.getElementById('totalBalance').textContent = totalBalance.toFixed(0) + ' ₽';

        let html = `<div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-6">`;
        
        filteredAccounts.forEach(acc => {
            html += `
            <div onclick="editAccount('${acc.Id}')" class="card glass rounded-3xl p-6 cursor-pointer glow-cyan">
                <div class="flex justify-between items-start">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-gradient-to-br from-[#00b4ff] to-[#00ffcc] rounded-2xl flex items-center justify-center text-3xl flex-shrink-0">${acc.Login[0].toUpperCase()}</div>
                        <div>
                            <h3 class="text-xl font-semibold">${acc.Login}</h3>
                            <p class="text-gray-400 text-sm">${acc.Email || '—'}</p>
                        </div>
                    </div>
                    <span class="px-4 py-1 text-xs font-medium rounded-2xl ${acc.Status === 'Online' ? 'bg-green-400 text-black' : 'bg-gray-600 text-white'}">${acc.Status}</span>
                </div>
                
                <div class="mt-8 space-y-3 text-sm">
                    <div class="flex justify-between"><span class="text-gray-400">Прокси</span><span class="font-medium">${acc.Proxy || '—'}</span></div>
                    <div class="flex justify-between"><span class="text-gray-400">PIN</span><span class="font-medium">${acc.Pin || '—'}</span></div>
                    <div class="flex justify-between"><span class="text-gray-400">Баланс</span><span class="font-medium text-[#00ffcc]">${acc.Balance}</span></div>
                </div>

                <div class="flex gap-3 mt-8">
                    <button onclick="event.stopImmediatePropagation(); runASF('${acc.Id}')" class="flex-1 py-3 text-sm font-medium bg-green-500 hover:bg-green-400 rounded-2xl">Запустить ASF</button>
                    <button onclick="event.stopImmediatePropagation(); openBrowser('${acc.Id}')" class="flex-1 py-3 text-sm font-medium bg-blue-500 hover:bg-blue-400 rounded-2xl">Браузер</button>
                </div>
            </div>`;
        });

        html += `</div>`;
        document.getElementById('mainContent').innerHTML = html;
    }

    function addNewAccount() {
        currentEditId = null;
        document.getElementById('modalTitle').innerHTML = 'Новый аккаунт';
        document.getElementById('login').value = `acc_${Date.now().toString().slice(-6)}`;
        document.getElementById('password').value = '';
        document.getElementById('email').value = '';
        document.getElementById('emailPass').value = '';
        document.getElementById('proxy').value = '';
        document.getElementById('pin').value = '';
        document.getElementById('mafile').value = '';
        document.getElementById('notes').value = '';
        document.getElementById('modal').classList.remove('hidden');
    }

    function editAccount(id) {
        const acc = accounts.find(a => a.Id === id);
        if (!acc) return;
        currentEditId = id;
        document.getElementById('modalTitle').innerHTML = `Редактировать <span class="text-[#00b4ff]">${acc.Login}</span>`;
        document.getElementById('login').value = acc.Login || '';
        document.getElementById('password').value = acc.Password || '';
        document.getElementById('email').value = acc.Email || '';
        document.getElementById('emailPass').value = acc.EmailPass || '';
        document.getElementById('proxy').value = acc.Proxy || '';
        document.getElementById('pin').value = acc.Pin || '';
        document.getElementById('mafile').value = acc.MaFile || '';
        document.getElementById('notes').value = acc.Notes || '';
        document.getElementById('modal').classList.remove('hidden');
    }

    function saveAccount() {
        const data = {
            Id: currentEditId || crypto.randomUUID(),
            Login: document.getElementById('login').value.trim(),
            Password: document.getElementById('password').value,
            Email: document.getElementById('email').value,
            EmailPass: document.getElementById('emailPass').value,
            Proxy: document.getElementById('proxy').value,
            Pin: document.getElementById('pin').value,
            MaFile: document.getElementById('mafile').value,
            Notes: document.getElementById('notes').value,
            Status: "Offline",
            Balance: "0 ₽",
            CreatedAt: currentEditId ? accounts.find(a => a.Id === currentEditId).CreatedAt : new Date().toISOString(),
            UpdatedAt: new Date().toISOString()
        };

        if (currentEditId) {
            const index = accounts.findIndex(a => a.Id === currentEditId);
            accounts[index] = data;
        } else {
            accounts.unshift(data);
        }

        saveToCSharp();
        closeModal();
        renderAccounts();
    }

    function closeModal() {
        document.getElementById('modal').classList.add('hidden');
    }

    function runASF(id) {
        window.chrome.webview.postMessage(JSON.stringify({ action: "runASF", data: id }));
    }

    function openBrowser(id) {
        window.chrome.webview.postMessage(JSON.stringify({ action: "openBrowser", data: id }));
    }

    function saveToCSharp() {
        window.chrome.webview.postMessage(JSON.stringify({ action: "saveAccounts", data: accounts }));
        showToast("Аккаунты сохранены");
    }

    function showToast(text) {
        const toast = document.getElementById('toast');
        document.getElementById('toastText').innerHTML = text;
        toast.classList.remove('hidden');
        setTimeout(() => toast.classList.add('hidden'), 2500);
    }

    window.receiveFromCSharp = function(msg) {
        if (msg.type === "accounts") {
            accounts = msg.data || [];
            renderAccounts();
        }
    };

    window.onload = () => {
        window.chrome.webview.postMessage(JSON.stringify({ action: "getAccounts" }));
    };
    </script>
</body>
</html>
