<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <title>ASF Manager PRO v3.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        * { font-family: 'Inter', system-ui, sans-serif; }
        .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.12); }
        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px -12px rgb(0 180 255 / 0.25); }
        .detail-row { display: flex; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.08); align-items: flex-start; }
        .detail-label { width: 160px; font-weight: 600; color: #9ca3af; flex-shrink: 0; }
        .detail-value { flex: 1; word-break: break-word; user-select: text; }
        .copy-btn { cursor: pointer; padding: 4px 8px; background: rgba(0,180,255,0.2); border-radius: 8px; font-size: 12px; margin-left: 8px; transition: 0.2s; }
        .copy-btn:hover { background: rgba(0,180,255,0.4); }
        .inventory-item { transition: 0.2s; cursor: pointer; }
        .inventory-item:hover { transform: scale(1.05); background: rgba(255,255,255,0.1); }
        .tab-active { background: #00b4ff; color: black; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #00b4ff; color: black; padding: 12px 24px; border-radius: 30px; z-index: 1000; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .search-input { transition: all 0.2s; }
        .search-input:focus { box-shadow: 0 0 0 2px rgba(0,180,255,0.3); }
        select, input[type="text"] { background: #1f2937; border: 1px solid #374151; }
        .stat-card { background: linear-gradient(135deg, #1f2937 0%, #111827 100%); }
    </style>
</head>
<body class="bg-[#0a0a0f] text-gray-100">

<div class="flex h-screen">
    <!-- Сайдбар -->
    <div class="w-80 bg-[#111827] border-r border-gray-800 p-6 flex flex-col">
        <div class="flex items-center gap-3 mb-8">
            <div class="w-12 h-12 bg-gradient-to-br from-[#00b4ff] to-cyan-400 rounded-2xl flex items-center justify-center text-3xl">🎮</div>
            <h1 class="text-3xl font-bold tracking-tighter">ASF PRO</h1>
        </div>

        <button onclick="addNewAccount()" class="w-full py-3 bg-[#00b4ff] hover:bg-cyan-400 text-black rounded-2xl font-semibold flex items-center justify-center gap-2 transition mb-4">
            <i class="fas fa-plus"></i> Добавить аккаунт
        </button>

        <button onclick="runASFForAll()" class="w-full py-3 bg-green-600 hover:bg-green-500 rounded-2xl font-semibold flex items-center justify-center gap-2 transition mb-6">
            <i class="fas fa-play"></i> Запустить ASF для всех
        </button>

        <div class="space-y-1">
            <button onclick="switchTab('accounts')" id="tabAccounts" class="tab-btn w-full text-left px-4 py-3 rounded-xl flex items-center gap-3 hover:bg-white/10 transition">
                <i class="fas fa-users w-5"></i> Аккаунты
            </button>
            <button onclick="switchTab('inventory')" id="tabInventory" class="tab-btn w-full text-left px-4 py-3 rounded-xl flex items-center gap-3 hover:bg-white/10 transition">
                <i class="fas fa-box w-5"></i> Инвентарь
            </button>
            <button onclick="switchTab('stats')" id="tabStats" class="tab-btn w-full text-left px-4 py-3 rounded-xl flex items-center gap-3 hover:bg-white/10 transition">
                <i class="fas fa-chart-line w-5"></i> Статистика
            </button>
            <button onclick="switchTab('settings')" id="tabSettings" class="tab-btn w-full text-left px-4 py-3 rounded-xl flex items-center gap-3 hover:bg-white/10 transition">
                <i class="fas fa-cog w-5"></i> Настройки
            </button>
        </div>

        <div class="mt-auto pt-6 text-xs text-gray-500 border-t border-gray-800">
            <i class="fas fa-database"></i> Локальное хранение<br>
            <span id="accountCount">0 аккаунтов</span>
        </div>
    </div>

    <!-- Основная область -->
    <div class="flex-1 p-6 overflow-auto" id="mainContent"></div>
</div>

<!-- Модальное окно детального просмотра -->
<div id="detailModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="glass w-[900px] rounded-2xl p-6 max-h-[85vh] overflow-auto">
        <div class="flex justify-between items-center mb-5">
            <h2 id="detailTitle" class="text-2xl font-bold flex items-center gap-2"></h2>
            <button onclick="closeDetailModal()" class="text-gray-400 hover:text-white text-2xl">&times;</button>
        </div>
        <div id="detailContent" class="mb-5"></div>
        <div class="flex gap-3">
            <button onclick="editFromDetail()" class="flex-1 py-3 bg-[#00b4ff] text-black font-semibold rounded-xl">
                <i class="fas fa-edit"></i> Редактировать
            </button>
            <button onclick="runASFFromDetail()" class="flex-1 py-3 bg-green-600 font-semibold rounded-xl">
                <i class="fas fa-play"></i> Запустить ASF
            </button>
            <button onclick="closeDetailModal()" class="flex-1 py-3 bg-gray-700 font-semibold rounded-xl">
                Закрыть
            </button>
        </div>
    </div>
</div>

<!-- Модальное окно редактирования -->
<div id="editModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="glass w-[800px] rounded-2xl p-6 max-h-[85vh] overflow-auto">
        <h2 id="editTitle" class="text-2xl font-bold mb-5">Редактирование</h2>
        <div class="grid grid-cols-2 gap-4">
            <div><label class="text-gray-400 text-sm">Логин Steam</label><input id="editLogin" class="w-full bg-[#1f2937] rounded-xl px-4 py-2.5 mt-1"></div>
            <div><label class="text-gray-400 text-sm">Пароль Steam</label><input id="editPassword" type="password" class="w-full bg-[#1f2937] rounded-xl px-4 py-2.5 mt-1"></div>
            <div><label class="text-gray-400 text-sm">Steam ID (для инвентаря)</label><input id="editSteamId" class="w-full bg-[#1f2937] rounded-xl px-4 py-2.5 mt-1" placeholder="7656119..."></div>
            <div><label class="text-gray-400 text-sm">Почта</label><input id="editEmail" class="w-full bg-[#1f2937] rounded-xl px-4 py-2.5 mt-1"></div>
            <div><label class="text-gray-400 text-sm">Пароль почты</label><input id="editEmailPass" type="password" class="w-full bg-[#1f2937] rounded-xl px-4 py-2.5 mt-1"></div>
            <div><label class="text-gray-400 text-sm">Прокси (ip:port)</label><input id="editProxy" class="w-full bg-[#1f2937] rounded-xl px-4 py-2.5 mt-1"></div>
            <div><label class="text-gray-400 text-sm">PIN-код</label><input id="editPin" class="w-full bg-[#1f2937] rounded-xl px-4 py-2.5 mt-1"></div>
            <div class="col-span-2"><label class="text-gray-400 text-sm">MaFile (JSON)</label><textarea id="editMaFile" rows="3" class="w-full bg-[#1f2937] rounded-xl px-4 py-2.5 mt-1 font-mono text-xs"></textarea></div>
            <div class="col-span-2"><label class="text-gray-400 text-sm">Заметки</label><textarea id="editNotes" rows="2" class="w-full bg-[#1f2937] rounded-xl px-4 py-2.5 mt-1"></textarea></div>
        </div>
        <div class="flex gap-3 mt-6">
            <button onclick="saveEditedAccount()" class="flex-1 py-3 bg-[#00b4ff] text-black font-semibold rounded-xl">Сохранить</button>
            <button onclick="closeEditModal()" class="flex-1 py-3 bg-gray-700 font-semibold rounded-xl">Отмена</button>
        </div>
    </div>
</div>

<script>
let accounts = [];
let currentTab = 'accounts';
let currentDetailAccount = null;
let currentEditId = null;
let currentFilter = '';
let currentSort = 'date-desc';

// Список поддерживаемых игр для инвентаря
const games = [
    { name: "Counter-Strike 2", appId: "730" },
    { name: "Dota 2", appId: "570" },
    { name: "Team Fortress 2", appId: "440" },
    { name: "Rust", appId: "252490" },
    { name: "Grand Theft Auto V", appId: "271590" },
    { name: "PUBG: BATTLEGROUNDS", appId: "578080" },
    { name: "Apex Legends", appId: "1172470" },
    { name: "Destiny 2", appId: "1085660" },
    { name: "Warframe", appId: "230410" },
    { name: "Path of Exile", appId: "238960" }
];

function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('tab-active', 'bg-[#00b4ff]', 'text-black'));
    document.getElementById(`tab${tab.charAt(0).toUpperCase() + tab.slice(1)}`).classList.add('tab-active', 'bg-[#00b4ff]', 'text-black');
    
    if (tab === 'accounts') renderAccounts();
    else if (tab === 'inventory') renderInventory();
    else if (tab === 'stats') renderStats();
    else if (tab === 'settings') renderSettings();
}

function getFilteredAndSortedAccounts() {
    let filtered = [...accounts];
    
    // Фильтрация
    if (currentFilter) {
        const searchLower = currentFilter.toLowerCase();
        filtered = filtered.filter(acc => 
            acc.Login.toLowerCase().includes(searchLower) ||
            (acc.Email && acc.Email.toLowerCase().includes(searchLower)) ||
            (acc.SteamId && acc.SteamId.includes(searchLower))
        );
    }
    
    // Сортировка
    switch(currentSort) {
        case 'date-desc':
            filtered.sort((a,b) => new Date(b.CreatedAt) - new Date(a.CreatedAt));
            break;
        case 'date-asc':
            filtered.sort((a,b) => new Date(a.CreatedAt) - new Date(b.CreatedAt));
            break;
        case 'login-asc':
            filtered.sort((a,b) => a.Login.localeCompare(b.Login));
            break;
        case 'login-desc':
            filtered.sort((a,b) => b.Login.localeCompare(a.Login));
            break;
        case 'status':
            filtered.sort((a,b) => (a.Status === 'Online' ? 0 : 1) - (b.Status === 'Online' ? 0 : 1));
            break;
    }
    
    return filtered;
}

function renderAccounts() {
    const filtered = getFilteredAndSortedAccounts();
    
    let html = `
        <div class="mb-6 flex gap-4 flex-wrap items-center">
            <div class="flex-1 min-w-[200px]">
                <div class="relative">
                    <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="searchInput" placeholder="Поиск по логину, email, Steam ID..." 
                           class="search-input w-full bg-[#1f2937] rounded-xl pl-10 pr-4 py-2.5"
                           onkeyup="updateSearch()">
                </div>
            </div>
            <select id="sortSelect" onchange="updateSort()" class="bg-[#1f2937] rounded-xl px-4 py-2.5">
                <option value="date-desc">📅 Сначала новые</option>
                <option value="date-asc">📅 Сначала старые</option>
                <option value="login-asc">🔤 Логин (А-Я)</option>
                <option value="login-desc">🔤 Логин (Я-А)</option>
                <option value="status">🟢 Статус</option>
            </select>
            <button onclick="deleteAllAccounts()" class="px-4 py-2.5 bg-red-600 hover:bg-red-500 rounded-xl">
                <i class="fas fa-trash-alt"></i> Удалить все
            </button>
            <div class="text-sm text-gray-400">
                Найдено: ${filtered.length} из ${accounts.length}
            </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5">
    `;
    
    filtered.forEach(acc => {
        let lastLoginText = acc.LastLogin ? new Date(acc.LastLogin).toLocaleDateString('ru-RU') : 'нет данных';
        html += `
        <div class="card glass rounded-2xl p-5" onclick="showAccountDetail('${acc.Id}')">
            <div class="flex justify-between items-start">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 bg-gradient-to-br from-[#00b4ff] to-cyan-400 rounded-xl flex items-center justify-center text-xl font-bold">${escapeHtml(acc.Login[0]?.toUpperCase() || '?')}</div>
                    <div>
                        <h3 class="text-xl font-semibold">${escapeHtml(acc.Login)}</h3>
                        <p class="text-gray-400 text-xs">${acc.Email || 'нет почты'}</p>
                    </div>
                </div>
                <span class="px-3 py-1 text-xs rounded-full ${acc.Status === 'Online' ? 'bg-green-400 text-black' : 'bg-gray-600'}">${acc.Status}</span>
            </div>
            <div class="mt-4 grid grid-cols-2 gap-2 text-xs">
                <div><span class="text-gray-500">Прокси:</span> ${acc.Proxy ? '✅' : '❌'}</div>
                <div><span class="text-gray-500">MaFile:</span> ${acc.MaFile ? '✅' : '❌'}</div>
                <div><span class="text-gray-500">Баланс:</span> <span class="text-emerald-400">${acc.Balance}</span></div>
                <div><span class="text-gray-500">Последний вход:</span> ${lastLoginText}</div>
            </div>
            <div class="mt-4 flex gap-2" onclick="event.stopPropagation()">
                <button onclick="runASF('${acc.Login}')" class="flex-1 py-2 bg-green-600 hover:bg-green-500 rounded-lg text-sm"><i class="fas fa-play"></i> ASF</button>
                <button onclick="viewInventory('${acc.SteamId || acc.Login}')" class="flex-1 py-2 bg-purple-600 hover:bg-purple-500 rounded-lg text-sm"><i class="fas fa-box"></i> Инвентарь</button>
                <button onclick="editAccount('${acc.Id}')" class="px-3 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg"><i class="fas fa-edit"></i></button>
                <button onclick="deleteAccount('${acc.Id}')" class="px-3 py-2 bg-red-600 hover:bg-red-500 rounded-lg"><i class="fas fa-trash"></i></button>
            </div>
        </div>`;
    });
    
    html += filtered.length === 0 ? `<div class="col-span-full text-center py-20 text-gray-500">Нет аккаунтов. Нажмите "Добавить аккаунт"</div>` : '';
    html += `</div>`;
    document.getElementById('mainContent').innerHTML = html;
    document.getElementById('accountCount').innerText = `${accounts.length} аккаунтов`;
}

function updateSearch() {
    currentFilter = document.getElementById('searchInput')?.value || '';
    renderAccounts();
}

function updateSort() {
    currentSort = document.getElementById('sortSelect')?.value || 'date-desc';
    renderAccounts();
}

function renderStats() {
    const onlineCount = accounts.filter(a => a.Status === 'Online').length;
    const totalBalance = accounts.reduce((sum, acc) => {
        const balanceNum = parseFloat(acc.Balance.replace(/[^0-9.-]/g, ''));
        return sum + (isNaN(balanceNum) ? 0 : balanceNum);
    }, 0);
    const withProxy = accounts.filter(a => a.Proxy).length;
    const withMaFile = accounts.filter(a => a.MaFile).length;
    const totalCards = accounts.reduce((sum, acc) => sum + (acc.CardsRemaining || 0), 0);
    const totalGames = accounts.reduce((sum, acc) => sum + (acc.GamesCount || 0), 0);
    
    document.getElementById('mainContent').innerHTML = `
        <div class="max-w-6xl mx-auto">
            <h2 class="text-2xl font-bold mb-6"><i class="fas fa-chart-line"></i> Статистика аккаунтов</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                <div class="stat-card rounded-2xl p-5">
                    <div class="text-gray-400 text-sm">Всего аккаунтов</div>
                    <div class="text-3xl font-bold mt-2">${accounts.length}</div>
                </div>
                <div class="stat-card rounded-2xl p-5">
                    <div class="text-gray-400 text-sm">Онлайн</div>
                    <div class="text-3xl font-bold mt-2 text-green-400">${onlineCount}</div>
                </div>
                <div class="stat-card rounded-2xl p-5">
                    <div class="text-gray-400 text-sm">Общий баланс</div>
                    <div class="text-3xl font-bold mt-2 text-emerald-400">${totalBalance.toFixed(2)} ₽</div>
                </div>
                <div class="stat-card rounded-2xl p-5">
                    <div class="text-gray-400 text-sm">С прокси / MaFile</div>
                    <div class="text-2xl font-bold mt-2">${withProxy} / ${withMaFile}</div>
                </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="glass rounded-2xl p-6">
                    <h3 class="text-xl font-semibold mb-4"><i class="fas fa-trophy"></i> Карточки и игры</h3>
                    <div class="space-y-3">
                        <div class="flex justify-between">
                            <span>Осталось карточек:</span>
                            <span class="font-bold text-emerald-400">${totalCards}</span>
                        </div>
                        <div class="flex justify-between">
                            <span>Всего игр:</span>
                            <span class="font-bold text-blue-400">${totalGames}</span>
                        </div>
                    </div>
                </div>
                
                <div class="glass rounded-2xl p-6">
                    <h3 class="text-xl font-semibold mb-4"><i class="fas fa-calendar"></i> Недавняя активность</h3>
                    <div class="space-y-2 max-h-64 overflow-auto">
                        ${accounts.filter(a => a.LastLogin).sort((a,b) => new Date(b.LastLogin) - new Date(a.LastLogin)).slice(0,5).map(acc => `
                            <div class="flex justify-between text-sm py-2 border-b border-gray-700">
                                <span>${escapeHtml(acc.Login)}</span>
                                <span class="text-gray-400">${new Date(acc.LastLogin).toLocaleString('ru-RU')}</span>
                            </div>
                        `).join('')}
                        ${accounts.filter(a => a.LastLogin).length === 0 ? '<div class="text-gray-400 text-center py-4">Нет данных</div>' : ''}
                    </div>
                </div>
            </div>
        </div>
    `;
}

function renderInventory() {
    let gameOptions = '';
    games.forEach(game => {
        gameOptions += `<option value="${game.appId}">${game.name}</option>`;
    });
    
    document.getElementById('mainContent').innerHTML = `
        <div class="max-w-4xl mx-auto">
            <div class="glass rounded-2xl p-6 mb-6">
                <h2 class="text-2xl font-bold mb-4"><i class="fas fa-box"></i> Инвентарь Steam</h2>
                <div class="flex gap-3 flex-wrap">
                    <input type="text" id="inventorySteamId" placeholder="Steam ID или логин" class="flex-1 min-w-[200px] bg-[#1f2937] rounded-xl px-4 py-3">
                    <select id="inventoryAppId" class="bg-[#1f2937] rounded-xl px-4 py-3">
                        ${gameOptions}
                    </select>
                    <button onclick="loadInventory()" class="px-6 bg-[#00b4ff] text-black rounded-xl font-semibold">Загрузить</button>
                </div>
                <div class="mt-3 text-xs text-gray-500">
                    <i class="fas fa-info-circle"></i> Поддерживаемые игры: CS2, Dota 2, TF2, Rust, GTA V, PUBG, Apex Legends и другие
                </div>
            </div>
            <div id="inventoryResult" class="glass rounded-2xl p-6">
                <p class="text-gray-400 text-center">Введите Steam ID для просмотра инвентаря</p>
            </div>
        </div>`;
}

function loadInventory() {
    let steamId = document.getElementById('inventorySteamId').value;
    let appId = document.getElementById('inventoryAppId').value;
    if (!steamId) { showToast('Введите Steam ID'); return; }
    document.getElementById('inventoryResult').innerHTML = '<p class="text-center"><i class="fas fa-spinner fa-spin"></i> Загрузка инвентаря...</p>';
    window.chrome.webview.postMessage(JSON.stringify({ action: "getInventory", data: `${steamId}|${appId}` }));
}

function viewInventory(steamId) {
    if (!steamId) { showToast('Укажите Steam ID в настройках аккаунта'); return; }
    switchTab('inventory');
    setTimeout(() => {
        const input = document.getElementById('inventorySteamId');
        if (input) input.value = steamId;
        loadInventory();
    }, 100);
}

function renderSettings() {
    document.getElementById('mainContent').innerHTML = `
        <div class="max-w-2xl mx-auto">
            <div class="glass rounded-2xl p-6 mb-6">
                <h2 class="text-2xl font-bold mb-4"><i class="fas fa-database"></i> Управление данными</h2>
                <button onclick="exportData()" class="w-full mb-3 py-3 bg-green-600 rounded-xl"><i class="fas fa-download"></i> Экспорт всех аккаунтов (JSON)</button>
                <button onclick="importData()" class="w-full py-3 bg-blue-600 rounded-xl"><i class="fas fa-upload"></i> Импорт аккаунтов</button>
            </div>
            <div class="glass rounded-2xl p-6">
                <h2 class="text-2xl font-bold mb-4"><i class="fas fa-info-circle"></i> О программе</h2>
                <p><strong>ASF Manager PRO v3.1</strong></p>
                <p class="text-gray-400 text-sm mt-2">✓ Управление аккаунтами Steam<br>✓ Запуск ASF<br>✓ Просмотр инвентаря из 10+ игр<br>✓ Статистика и мониторинг<br>✓ Поиск, фильтрация, сортировка<br>✓ Массовые операции</p>
                <p class="text-gray-500 text-xs mt-4">Все данные хранятся локально в файле accounts.json</p>
            </div>
        </div>`;
}

function deleteAllAccounts() {
    if (confirm("⚠️ ВНИМАНИЕ! Вы уверены, что хотите удалить ВСЕ аккаунты? Это действие необратимо.")) {
        window.chrome.webview.postMessage(JSON.stringify({ action: "deleteAllAccounts", data: "" }));
        accounts = [];
        renderAccounts();
        showToast('Все аккаунты удалены');
    }
}

function runASFForAll() {
    if (accounts.length === 0) {
        showToast('Нет аккаунтов для запуска');
        return;
    }
    if (confirm(`Запустить ASF для всех ${accounts.length} аккаунтов?`)) {
        window.chrome.webview.postMessage(JSON.stringify({ action: "runASFForAll", data: "" }));
    }
}

function exportData() {
    const dataStr = JSON.stringify(accounts, null, 2);
    const blob = new Blob([dataStr], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `asf_backup_${new Date().toISOString().slice(0,19)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('Экспорт выполнен');
}

function importData() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = e => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = ev => {
            try {
                const imported = JSON.parse(ev.target.result);
                if (Array.isArray(imported)) {
                    accounts = imported;
                    window.chrome.webview.postMessage(JSON.stringify({ action: "saveAccounts", data: accounts }));
                    showToast(`Импортировано ${accounts.length} аккаунтов`);
                    renderAccounts();
                }
            } catch { showToast('Ошибка импорта'); }
        };
        reader.readAsText(file);
    };
    input.click();
}

function editFromDetail() {
    if (currentDetailAccount) {
        closeDetailModal();
        editAccount(currentDetailAccount.Id);
    }
}

function runASFFromDetail() {
    if (currentDetailAccount) {
        runASF(currentDetailAccount.Login);
        showToast(`Запуск ASF для ${currentDetailAccount.Login}`);
    }
}

function addNewAccount() {
    currentEditId = null;
    document.getElementById('editTitle').textContent = 'Новый аккаунт';
    clearEditForm();
    document.getElementById('editModal').classList.remove('hidden');
}

function editAccount(id) {
    const acc = accounts.find(a => a.Id === id);
    if (!acc) return;
    currentEditId = id;
    document.getElementById('editTitle').textContent = `Редактирование: ${acc.Login}`;
    document.getElementById('editLogin').value = acc.Login || '';
    document.getElementById('editPassword').value = acc.Password || '';
    document.getElementById('editSteamId').value = acc.SteamId || '';
    document.getElementById('editEmail').value = acc.Email || '';
    document.getElementById('editEmailPass').value = acc.EmailPass || '';
    document.getElementById('editProxy').value = acc.Proxy || '';
    document.getElementById('editPin').value = acc.Pin || '';
    document.getElementById('editMaFile').value = acc.MaFile || '';
    document.getElementById('editNotes').value = acc.Notes || '';
    document.getElementById('editModal').classList.remove('hidden');
}

function clearEditForm() {
    document.getElementById('editLogin').value = `acc_${Date.now().toString().slice(-6)}`;
    document.getElementById('editPassword').value = '';
    document.getElementById('editSteamId').value = '';
    document.getElementById('editEmail').value = '';
    document.getElementById('editEmailPass').value = '';
    document.getElementById('editProxy').value = '';
    document.getElementById('editPin').value = '';
    document.getElementById('editMaFile').value = '';
    document.getElementById('editNotes').value = '';
}

function saveEditedAccount() {
    const data = {
        Id: currentEditId || 'acc-' + Date.now(),
        Login: document.getElementById('editLogin').value.trim(),
        Password: document.getElementById('editPassword').value,
        SteamId: document.getElementById('editSteamId').value,
        Email: document.getElementById('editEmail').value,
        EmailPass: document.getElementById('editEmailPass').value,
        Proxy: document.getElementById('editProxy').value,
        Pin: document.getElementById('editPin').value,
        MaFile: document.getElementById('editMaFile').value,
        Notes: document.getElementById('editNotes').value,
        Status: currentEditId ? (accounts.find(a => a.Id === currentEditId)?.Status || "Offline") : "Offline",
        Balance: currentEditId ? (accounts.find(a => a.Id === currentEditId)?.Balance || "0 ₽") : "0 ₽",
        CreatedAt: currentEditId ? (accounts.find(a => a.Id === currentEditId)?.CreatedAt || new Date().toISOString()) : new Date().toISOString(),
        LastLogin: currentEditId ? (accounts.find(a => a.Id === currentEditId)?.LastLogin || "") : "",
        CardsRemaining: currentEditId ? (accounts.find(a => a.Id === currentEditId)?.CardsRemaining || 0) : 0,
        GamesCount: currentEditId ? (accounts.find(a => a.Id === currentEditId)?.GamesCount || 0) : 0
    };

    if (currentEditId) {
        const index = accounts.findIndex(a => a.Id === currentEditId);
        if (index > -1) accounts[index] = data;
    } else {
        accounts.unshift(data);
    }

    window.chrome.webview.postMessage(JSON.stringify({ action: "saveAccounts", data: accounts }));
    closeEditModal();
    renderAccounts();
    showToast('Сохранено');
}

function deleteAccount(id) {
    if (confirm("Удалить аккаунт навсегда?")) {
        accounts = accounts.filter(a => a.Id !== id);
        window.chrome.webview.postMessage(JSON.stringify({ action: "saveAccounts", data: accounts }));
        renderAccounts();
        showToast('Аккаунт удалён');
    }
}

function runASF(login) {
    window.chrome.webview.postMessage(JSON.stringify({ action: "runASF", data: login }));
}

function showAccountDetail(id) {
    const acc = accounts.find(a => a.Id === id);
    if (!acc) return;
    currentDetailAccount = acc;
    
    document.getElementById('detailTitle').innerHTML = `<i class="fas fa-user-circle text-[#00b4ff]"></i> ${escapeHtml(acc.Login)}`;
    
    let html = `
        <div class="detail-row"><div class="detail-label"><i class="fas fa-sign-in-alt w-5"></i> Логин Steam:</div><div class="detail-value">${escapeHtml(acc.Login)} <span class="copy-btn" onclick="copyToClipboard('${escapeHtml(acc.Login)}')">📋 Копировать</span></div></div>
        <div class="detail-row"><div class="detail-label"><i class="fas fa-lock w-5"></i> Пароль Steam:</div><div class="detail-value">${acc.Password ? '••••••••' : '—'} <span class="copy-btn" onclick="copyToClipboard('${escapeHtml(acc.Password)}')">📋 Показать/копировать</span></div></div>
        <div class="detail-row"><div class="detail-label"><i class="fas fa-envelope w-5"></i> Почта:</div><div class="detail-value">${escapeHtml(acc.Email) || '—'} <span class="copy-btn" onclick="copyToClipboard('${escapeHtml(acc.Email)}')">📋 Копировать</span></div></div>
        <div class="detail-row"><div class="detail-label"><i class="fas fa-key w-5"></i> Пароль почты:</div><div class="detail-value">${acc.EmailPass ? '••••••••' : '—'} <span class="copy-btn" onclick="copyToClipboard('${escapeHtml(acc.EmailPass)}')">📋 Копировать</span></div></div>
        <div class="detail-row"><div class="detail-label"><i class="fas fa-network-wired w-5"></i> Прокси:</div><div class="detail-value">${escapeHtml(acc.Proxy) || '—'} <span class="copy-btn" onclick="copyToClipboard('${escapeHtml(acc.Proxy)}')">📋 Копировать</span></div></div>
        <div class="detail-row"><div class="detail-label"><i class="fas fa-digit w-5"></i> PIN-код:</div><div class="detail-value">${acc.Pin || '—'} <span class="copy-btn" onclick="copyToClipboard('${escapeHtml(acc.Pin)}')">📋 Копировать</span></div></div>
        <div class="detail-row"><div class="detail-label"><i class="fab fa-steam w-5"></i> Steam ID:</div><div class="detail-value">${acc.SteamId || '—'} <span class="copy-btn" onclick="copyToClipboard('${escapeHtml(acc.SteamId)}')">📋 Копировать</span></div></div>
        <div class="detail-row"><div class="detail-label"><i class="fas fa-calendar-plus w-5"></i> Дата создания:</div><div class="detail-value">${new Date(acc.CreatedAt).toLocaleString('ru-RU')}</div></div>
        <div class="detail-row"><div class="detail-label"><i class="fas fa-calendar-check w-5"></i> Последний вход:</div><div class="detail-value">${acc.LastLogin ? new Date(acc.LastLogin).toLocaleString('ru-RU') : '—'}</div></div>
        <div class="detail-row"><div class="detail-label"><i class="fas fa-coins w-5"></i> Баланс:</div><div class="detail-value text-emerald-400">${acc.Balance}</div></div>
    `;
    
    if (acc.MaFile) {
        html += `<div class="detail-row"><div class="detail-label"><i class="fas fa-file-code w-5"></i> MaFile:</div><div class="detail-value"><pre class="bg-black/30 p-3 rounded-lg text-xs overflow-auto max-h-40">${escapeHtml(acc.MaFile.substring(0, 500))}${acc.MaFile.length > 500 ? '...' : ''}</pre><span class="copy-btn" onclick="copyToClipboard('${escapeHtml(acc.MaFile)}')">📋 Копировать весь MaFile</span></div></div>`;
    }
    
    if (acc.Notes) {
        html += `<div class="detail-row"><div class="detail-label"><i class="fas fa-sticky-note w-5"></i> Заметки:</div><div class="detail-value whitespace-pre-wrap">${escapeHtml(acc.Notes)} <span class="copy-btn" onclick="copyToClipboard('${escapeHtml(acc.Notes)}')">📋 Копировать</span></div></div>`;
    }
    
    document.getElementById('detailContent').innerHTML = html;
    document.getElementById('detailModal').classList.remove('hidden');
}

function copyToClipboard(text) {
    if (!text) { showToast('Нет данных для копирования'); return; }
    window.chrome.webview.postMessage(JSON.stringify({ action: "copyToClipboard", data: text }));
    showToast('Скопировано!');
}

function showToast(message) {
    let toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
}

function closeDetailModal() {
    document.getElementById('detailModal').classList.add('hidden');
    currentDetailAccount = null;
}

function closeEditModal() {
    document.getElementById('editModal').classList.add('hidden');
    currentEditId = null;
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

window.receiveFromCSharp = function(msg) {
    if (msg.type === "accounts") {
        accounts = msg.data || [];
        if (currentTab === 'accounts') renderAccounts();
        document.getElementById('accountCount').innerText = `${accounts.length} аккаунтов`;
    } else if (msg.type === "inventoryData") {
        renderInventoryResult(msg.data);
    } else if (msg.type === "inventoryError") {
        document.getElementById('inventoryResult').innerHTML = `<p class="text-red-400 text-center">${msg.data}</p>`;
    } else if (msg.type === "asfStarted") {
        showToast(msg.data);
        if (currentTab === 'accounts') renderAccounts();
        if (currentTab === 'stats') renderStats();
    }
};

function renderInventoryResult(data) {
    if (!data || !data.data || !data.data.success || !data.data.assets || data.data.assets.length === 0) {
        document.getElementById('inventoryResult').innerHTML = '<p class="text-gray-400 text-center">Нет предметов или профиль приватный</p>';
        return;
    }
    
    const inventory = data.data;
    const appId = data.appId;
    const gameName = games.find(g => g.appId === appId)?.name || `Игра ${appId}`;
    let items = inventory.assets || [];
    let descriptions = inventory.descriptions || [];
    
    let html = `<div class="mb-4"><h3 class="text-xl font-semibold">${gameName}</h3><p class="text-gray-400 text-sm">Всего предметов: ${inventory.total_inventory_count || items.length}</p></div>`;
    html += `<div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3">`;
    
    items.forEach(item => {
        let desc = descriptions.find(d => d.classid === item.classid);
        if (desc) {
            html += `
            <div class="inventory-item bg-[#1f2937] rounded-xl p-3 text-center">
                <img src="https://steamcommunity.com/economy/image/${desc.icon_url}" class="w-16 h-16 mx-auto mb-2" onerror="this.src='https://steamcommunity.com/images/favicon.png'">
                <p class="text-xs font-semibold">${escapeHtml(desc.name)}</p>
                <p class="text-xs text-gray-400">${desc.type || ''}</p>
                <p class="text-xs text-emerald-400 mt-1">x${item.amount}</p>
            </div>`;
        }
    });
    
    html += `</div>`;
    if (items.length === 0) html = '<p class="text-gray-400 text-center">Нет предметов</p>';
    document.getElementById('inventoryResult').innerHTML = html;
}

window.onload = () => {
    window.chrome.webview.postMessage(JSON.stringify({ action: "getAccounts" }));
    switchTab('accounts');
};
</script>
