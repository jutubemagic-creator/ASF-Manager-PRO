<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <title>ASF Manager PRO v2.6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.12); }
        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .card:hover { transform: translateY(-8px); box-shadow: 0 25px 50px -12px rgb(0 180 255 / 0.3); }
        .detail-row { display: flex; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .detail-label { width: 180px; font-weight: 600; color: #9ca3af; }
        .detail-value { flex: 1; word-break: break-word; }
    </style>
</head>
<body class="bg-[#0a0a0f] text-gray-100">

<div class="flex h-screen">
    <!-- Сайдбар -->
    <div class="w-80 bg-[#111827] border-r border-gray-800 p-6 flex flex-col">
        <div class="flex items-center gap-3 mb-10">
            <div class="w-10 h-10 bg-gradient-to-br from-[#00b4ff] to-cyan-400 rounded-3xl flex items-center justify-center text-3xl">🤖</div>
            <h1 class="text-4xl font-bold tracking-tighter">ASF PRO</h1>
        </div>

        <button onclick="addNewAccount()" 
                class="w-full py-4 bg-[#00b4ff] hover:bg-cyan-400 text-black rounded-3xl font-semibold flex items-center justify-center gap-3 transition mb-8">
            <i class="fas fa-plus"></i> Добавить аккаунт
        </button>

        <div class="text-xs text-gray-500 mt-auto pt-8">
            <i class="fas fa-shield-alt"></i> Все данные локально
        </div>
    </div>

    <!-- Основная область -->
    <div class="flex-1 p-8 overflow-auto" id="mainContent"></div>
</div>

<!-- Модальное окно для просмотра всех данных -->
<div id="detailModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="glass w-[900px] rounded-3xl p-8 max-h-[90vh] overflow-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 id="detailTitle" class="text-3xl font-bold"></h2>
            <button onclick="closeDetailModal()" class="text-gray-400 hover:text-white text-2xl">&times;</button>
        </div>
        <div id="detailContent" class="mb-6"></div>
        <div class="flex gap-4">
            <button onclick="editFromDetail()" class="flex-1 py-4 bg-[#00b4ff] text-black font-semibold rounded-3xl">
                <i class="fas fa-edit"></i> Редактировать
            </button>
            <button onclick="closeDetailModal()" class="flex-1 py-4 bg-gray-700 font-semibold rounded-3xl">
                Закрыть
            </button>
        </div>
    </div>
</div>

<!-- Модальное окно для редактирования -->
<div id="editModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="glass w-[800px] rounded-3xl p-8 max-h-[90vh] overflow-auto">
        <h2 id="editTitle" class="text-3xl font-bold mb-6">Редактирование</h2>
        <div class="grid grid-cols-2 gap-4">
            <div><label class="text-gray-400 text-sm">Логин Steam</label><input id="editLogin" class="w-full bg-[#1f2937] rounded-2xl px-5 py-3 mt-1"></div>
            <div><label class="text-gray-400 text-sm">Пароль Steam</label><input id="editPassword" type="password" class="w-full bg-[#1f2937] rounded-2xl px-5 py-3 mt-1"></div>
            <div><label class="text-gray-400 text-sm">Почта</label><input id="editEmail" class="w-full bg-[#1f2937] rounded-2xl px-5 py-3 mt-1"></div>
            <div><label class="text-gray-400 text-sm">Пароль почты</label><input id="editEmailPass" type="password" class="w-full bg-[#1f2937] rounded-2xl px-5 py-3 mt-1"></div>
            <div class="col-span-2"><label class="text-gray-400 text-sm">Прокси (ip:port)</label><input id="editProxy" class="w-full bg-[#1f2937] rounded-2xl px-5 py-3 mt-1"></div>
            <div><label class="text-gray-400 text-sm">PIN-код</label><input id="editPin" class="w-full bg-[#1f2937] rounded-2xl px-5 py-3 mt-1"></div>
            <div class="col-span-2"><label class="text-gray-400 text-sm">MaFile (JSON)</label><textarea id="editMaFile" rows="4" class="w-full bg-[#1f2937] rounded-2xl px-5 py-3 mt-1 font-mono text-sm"></textarea></div>
            <div class="col-span-2"><label class="text-gray-400 text-sm">Заметки</label><textarea id="editNotes" rows="3" class="w-full bg-[#1f2937] rounded-2xl px-5 py-3 mt-1"></textarea></div>
        </div>
        <div class="flex gap-4 mt-8">
            <button onclick="saveEditedAccount()" class="flex-1 py-4 bg-[#00b4ff] text-black font-semibold rounded-3xl">Сохранить</button>
            <button onclick="closeEditModal()" class="flex-1 py-4 bg-gray-700 font-semibold rounded-3xl">Отмена</button>
        </div>
    </div>
</div>

<script>
let accounts = [];
let currentDetailAccount = null;
let currentEditId = null;

function renderAccounts() {
    let html = `<div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">`;
    
    accounts.forEach(acc => {
        html += `
        <div class="card glass rounded-3xl p-6" onclick="showAccountDetail('${acc.Id}')">
            <div class="flex justify-between items-start">
                <div class="flex items-center gap-4">
                    <div class="w-14 h-14 bg-gradient-to-br from-[#00b4ff] to-cyan-400 rounded-2xl flex items-center justify-center text-3xl font-bold">${acc.Login[0]?.toUpperCase() || '?'}</div>
                    <div>
                        <h3 class="text-2xl font-semibold">${acc.Login}</h3>
                        <p class="text-gray-400 text-sm">${acc.Email || 'нет почты'}</p>
                    </div>
                </div>
                <span class="px-4 py-1 text-xs rounded-full ${acc.Status === 'Online' ? 'bg-green-400 text-black' : 'bg-gray-600'}">${acc.Status}</span>
            </div>
            <div class="mt-6 space-y-2 text-sm">
                <div class="flex justify-between"><span class="text-gray-400">Прокси:</span><span>${acc.Proxy || '—'}</span></div>
                <div class="flex justify-between"><span class="text-gray-400">Баланс:</span><span class="text-emerald-400">${acc.Balance}</span></div>
            </div>
            <div class="mt-6 flex gap-2" onclick="event.stopPropagation()">
                <button onclick="runASF('${acc.Id}')" class="flex-1 py-2 bg-green-600 hover:bg-green-500 rounded-xl text-sm">▶ ASF</button>
                <button onclick="openBrowser('${acc.Id}')" class="flex-1 py-2 bg-blue-600 hover:bg-blue-500 rounded-xl text-sm">🌐 Браузер</button>
                <button onclick="editAccount('${acc.Id}')" class="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded-xl">✏️</button>
                <button onclick="deleteAccount('${acc.Id}')" class="px-4 py-2 bg-red-600 hover:bg-red-500 rounded-xl">🗑</button>
            </div>
        </div>`;
    });
    
    html += accounts.length === 0 ? `<div class="col-span-full text-center py-20 text-gray-500">Нет аккаунтов. Нажмите "Добавить аккаунт"</div>` : '';
    html += `</div>`;
    document.getElementById('mainContent').innerHTML = html;
}

function showAccountDetail(id) {
    const acc = accounts.find(a => a.Id === id);
    if (!acc) return;
    currentDetailAccount = acc;
    
    document.getElementById('detailTitle').innerHTML = `<i class="fas fa-user-circle text-[#00b4ff]"></i> ${acc.Login}`;
    
    let html = `
        <div class="detail-row"><div class="detail-label"><i class="fas fa-sign-in-alt w-5"></i> Логин Steam:</div><div class="detail-value">${escapeHtml(acc.Login)}</div></div>
        <div class="detail-row"><div class="detail-label"><i class="fas fa-lock w-5"></i> Пароль Steam:</div><div class="detail-value">${acc.Password ? '••••••••' : '—'}</div></div>
        <div class="detail-row"><div class="detail-label"><i class="fas fa-envelope w-5"></i> Почта:</div><div class="detail-value">${escapeHtml(acc.Email) || '—'}</div></div>
        <div class="detail-row"><div class="detail-label"><i class="fas fa-key w-5"></i> Пароль почты:</div><div class="detail-value">${acc.EmailPass ? '••••••••' : '—'}</div></div>
        <div class="detail-row"><div class="detail-label"><i class="fas fa-network-wired w-5"></i> Прокси:</div><div class="detail-value">${escapeHtml(acc.Proxy) || '—'}</div></div>
        <div class="detail-row"><div class="detail-label"><i class="fas fa-digit w-5"></i> PIN-код:</div><div class="detail-value">${acc.Pin || '—'}</div></div>
        <div class="detail-row"><div class="detail-label"><i class="fas fa-chart-line w-5"></i> Статус:</div><div class="detail-value"><span class="px-3 py-1 rounded-full text-xs ${acc.Status === 'Online' ? 'bg-green-400 text-black' : 'bg-gray-600'}">${acc.Status}</span></div></div>
        <div class="detail-row"><div class="detail-label"><i class="fas fa-coins w-5"></i> Баланс:</div><div class="detail-value text-emerald-400">${acc.Balance}</div></div>
        <div class="detail-row"><div class="detail-label"><i class="fas fa-calendar w-5"></i> Создан:</div><div class="detail-value">${new Date(acc.CreatedAt).toLocaleString('ru-RU')}</div></div>
    `;
    
    if (acc.MaFile) {
        html += `<div class="detail-row"><div class="detail-label"><i class="fas fa-file-code w-5"></i> MaFile:</div><div class="detail-value"><pre class="bg-black/30 p-3 rounded-xl text-xs overflow-auto max-h-48">${escapeHtml(acc.MaFile.substring(0, 500))}${acc.MaFile.length > 500 ? '...' : ''}</pre></div></div>`;
    }
    
    if (acc.Notes) {
        html += `<div class="detail-row"><div class="detail-label"><i class="fas fa-sticky-note w-5"></i> Заметки:</div><div class="detail-value whitespace-pre-wrap">${escapeHtml(acc.Notes)}</div></div>`;
    }
    
    document.getElementById('detailContent').innerHTML = html;
    document.getElementById('detailModal').classList.remove('hidden');
}

function editFromDetail() {
    if (currentDetailAccount) {
        closeDetailModal();
        editAccount(currentDetailAccount.Id);
    }
}

function addNewAccount() {
    currentEditId = null;
    document.getElementById('editTitle').textContent = 'Новый аккаунт';
    clearEditForm();
    document.getElementById('editModal').classList.remove('hidden');
}

function editAccount(id) {
    const acc = accounts.find(a => a.Id === id);
    if (!acc) return;
    currentEditId = id;
    document.getElementById('editTitle').textContent = `Редактирование: ${acc.Login}`;
    document.getElementById('editLogin').value = acc.Login || '';
    document.getElementById('editPassword').value = acc.Password || '';
    document.getElementById('editEmail').value = acc.Email || '';
    document.getElementById('editEmailPass').value = acc.EmailPass || '';
    document.getElementById('editProxy').value = acc.Proxy || '';
    document.getElementById('editPin').value = acc.Pin || '';
    document.getElementById('editMaFile').value = acc.MaFile || '';
    document.getElementById('editNotes').value = acc.Notes || '';
    document.getElementById('editModal').classList.remove('hidden');
}

function clearEditForm() {
    document.getElementById('editLogin').value = `acc_${Date.now().toString().slice(-6)}`;
    document.getElementById('editPassword').value = '';
    document.getElementById('editEmail').value = '';
    document.getElementById('editEmailPass').value = '';
    document.getElementById('editProxy').value = '';
    document.getElementById('editPin').value = '';
    document.getElementById('editMaFile').value = '';
    document.getElementById('editNotes').value = '';
}

function saveEditedAccount() {
    const data = {
        Id: currentEditId || 'acc-' + Date.now(),
        Login: document.getElementById('editLogin').value.trim(),
        Password: document.getElementById('editPassword').value,
        Email: document.getElementById('editEmail').value,
        EmailPass: document.getElementById('editEmailPass').value,
        Proxy: document.getElementById('editProxy').value,
        Pin: document.getElementById('editPin').value,
        MaFile: document.getElementById('editMaFile').value,
        Notes: document.getElementById('editNotes').value,
        Status: "Offline",
        Balance: "0 ₽",
        CreatedAt: currentEditId ? (accounts.find(a => a.Id === currentEditId)?.CreatedAt || new Date().toISOString()) : new Date().toISOString()
    };

    if (currentEditId) {
        const index = accounts.findIndex(a => a.Id === currentEditId);
        if (index > -1) accounts[index] = data;
    } else {
        accounts.unshift(data);
    }

    window.chrome.webview.postMessage(JSON.stringify({ action: "saveAccounts", data: accounts }));
    closeEditModal();
    renderAccounts();
}

function deleteAccount(id) {
    if (confirm("Удалить аккаунт навсегда?")) {
        accounts = accounts.filter(a => a.Id !== id);
        window.chrome.webview.postMessage(JSON.stringify({ action: "saveAccounts", data: accounts }));
        renderAccounts();
    }
}

function runASF(id) {
    window.chrome.webview.postMessage(JSON.stringify({ action: "runASF", data: id }));
}

function openBrowser(id) {
    window.chrome.webview.postMessage(JSON.stringify({ action: "openBrowser", data: id }));
}

function closeDetailModal() {
    document.getElementById('detailModal').classList.add('hidden');
    currentDetailAccount = null;
}

function closeEditModal() {
    document.getElementById('editModal').classList.add('hidden');
    currentEditId = null;
}

function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

window.receiveFromCSharp = function(msg) {
    if (msg.type === "accounts") {
        accounts = msg.data || [];
        renderAccounts();
    }
};

window.onload = () => {
    window.chrome.webview.postMessage(JSON.stringify({ action: "getAccounts" }));
};
</script>
</body>
</html>
