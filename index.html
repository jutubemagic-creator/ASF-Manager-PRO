<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <title>ASF Manager PRO v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; }
        .glass { background: rgba(255,255,255,0.06); backdrop-filter: blur(16px); }
        .modal { animation: modalPop 0.3s ease-out; }
        @keyframes modalPop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-[#0a0a0f] text-gray-100">
    <div class="flex h-screen">
        <!-- Сайдбар -->
        <div class="w-72 bg-[#111827] border-r border-gray-800 flex flex-col">
            <div class="p-6 border-b border-gray-800">
                <h1 class="text-3xl font-bold flex items-center gap-3 text-[#00b4ff]">
                    <i class="fas fa-robot"></i> ASF PRO
                </h1>
                <p class="text-gray-500 text-sm">Мощный локальный менеджер</p>
            </div>

            <nav class="flex-1 p-4 space-y-1">
                <button onclick="switchTab(0)" class="tab-btn active w-full flex items-center gap-3 px-5 py-3 rounded-2xl hover:bg-gray-800 transition">
                    <i class="fas fa-users"></i> Аккаунты
                </button>
                <button onclick="switchTab(1)" class="tab-btn w-full flex items-center gap-3 px-5 py-3 rounded-2xl hover:bg-gray-800 transition">
                    <i class="fas fa-box"></i> Инвентарь
                </button>
                <button onclick="switchTab(2)" class="tab-btn w-full flex items-center gap-3 px-5 py-3 rounded-2xl hover:bg-gray-800 transition">
                    <i class="fas fa-globe"></i> Прокси
                </button>
                <button onclick="switchTab(3)" class="tab-btn w-full flex items-center gap-3 px-5 py-3 rounded-2xl hover:bg-gray-800 transition">
                    <i class="fas fa-steam-symbol"></i> ASF Управление
                </button>
            </nav>
        </div>

        <!-- Основной контент -->
        <div class="flex-1 overflow-auto" id="mainContent"></div>
    </div>

    <!-- Модальное окно редактирования аккаунта -->
    <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="glass w-full max-w-2xl rounded-3xl p-8 modal">
            <h2 class="text-2xl font-semibold mb-6" id="modalTitle">Редактировать аккаунт</h2>
            <div class="grid grid-cols-2 gap-4">
                <input id="login" placeholder="Логин" class="bg-gray-900 border border-gray-700 rounded-2xl px-4 py-3">
                <input id="password" type="password" placeholder="Пароль" class="bg-gray-900 border border-gray-700 rounded-2xl px-4 py-3">
                <input id="email" placeholder="Почта" class="bg-gray-900 border border-gray-700 rounded-2xl px-4 py-3">
                <input id="emailPass" type="password" placeholder="Пароль от почты" class="bg-gray-900 border border-gray-700 rounded-2xl px-4 py-3">
                <input id="proxy" placeholder="Прокси (ip:port)" class="bg-gray-900 border border-gray-700 rounded-2xl px-4 py-3 col-span-2">
                <textarea id="mafile" placeholder="Содержимое mafile (JSON)" class="bg-gray-900 border border-gray-700 rounded-3xl px-4 py-3 col-span-2 h-32"></textarea>
            </div>
            <div class="flex gap-3 mt-8">
                <button onclick="saveAccount()" class="flex-1 bg-[#00b4ff] hover:bg-[#0099ff] py-4 rounded-2xl font-medium">Сохранить</button>
                <button onclick="closeModal()" class="flex-1 bg-gray-800 hover:bg-gray-700 py-4 rounded-2xl">Отмена</button>
            </div>
        </div>
    </div>

    <script>
    let accounts = [];
    let currentEditId = null;

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active', 'bg-gray-800'));
        document.querySelectorAll('.tab-btn')[tab].classList.add('active', 'bg-gray-800');
        if (tab === 0) renderAccounts();
    }

    function renderAccounts() {
        let html = `
        <div class="p-8">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-4xl font-semibold">Аккаунты <span class="text-gray-500 text-2xl">(${accounts.length})</span></h2>
                <button onclick="addNewAccount()" 
                        class="bg-[#00b4ff] hover:bg-[#0099ff] px-8 py-4 rounded-2xl flex items-center gap-3 text-lg font-medium">
                    <i class="fas fa-plus"></i> Новый аккаунт
                </button>
            </div>

            <div class="bg-[#111827] rounded-3xl overflow-hidden border border-gray-800">
                <table class="w-full">
                    <thead>
                        <tr class="text-left text-gray-400 border-b border-gray-800">
                            <th class="p-6">Логин</th>
                            <th class="p-6">Статус</th>
                            <th class="p-6">Прокси</th>
                            <th class="p-6">Баланс</th>
                            <th class="p-6 text-right">Действия</th>
                        </tr>
                    </thead>
                    <tbody id="accountsTableBody"></tbody>
                </table>
            </div>
        </div>`;

        document.getElementById('mainContent').innerHTML = html;
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('accountsTableBody');
        tbody.innerHTML = accounts.map(acc => `
            <tr class="border-b border-gray-800 hover:bg-gray-900/50 transition">
                <td class="p-6 font-medium">${acc.Login}</td>
                <td class="p-6">
                    <span class="px-4 py-1.5 rounded-full text-sm ${acc.Status === 'Online' ? 'bg-green-500/20 text-green-400' : 'bg-gray-600/30 text-gray-400'}">
                        ${acc.Status}
                    </span>
                </td>
                <td class="p-6 text-gray-400">${acc.Proxy || '—'}</td>
                <td class="p-6 font-mono">${acc.Balance}</td>
                <td class="p-6 text-right space-x-2">
                    <button onclick="runASF('${acc.Id}')" class="px-5 py-2 bg-green-600 hover:bg-green-500 rounded-xl text-sm">Запустить ASF</button>
                    <button onclick="openAntiDetect('${acc.Id}')" class="px-5 py-2 bg-blue-600 hover:bg-blue-500 rounded-xl text-sm">Браузер</button>
                    <button onclick="editAccount('${acc.Id}')" class="px-5 py-2 bg-gray-700 hover:bg-gray-600 rounded-xl text-sm">Редактировать</button>
                    <button onclick="deleteAccount('${acc.Id}')" class="px-5 py-2 bg-red-600/80 hover:bg-red-600 rounded-xl text-sm">Удалить</button>
                </td>
            </tr>
        `).join('');
    }

    function addNewAccount() {
        currentEditId = null;
        document.getElementById('modalTitle').textContent = 'Новый аккаунт';
        document.getElementById('login').value = `acc_${Date.now().toString().slice(-6)}`;
        document.getElementById('password').value = '';
        document.getElementById('email').value = '';
        document.getElementById('emailPass').value = '';
        document.getElementById('proxy').value = '';
        document.getElementById('mafile').value = '';
        document.getElementById('modal').classList.remove('hidden');
    }

    function editAccount(id) {
        const acc = accounts.find(a => a.Id === id);
        if (!acc) return;
        currentEditId = id;
        document.getElementById('modalTitle').textContent = 'Редактировать аккаунт';
        document.getElementById('login').value = acc.Login;
        document.getElementById('password').value = acc.Password;
        document.getElementById('email').value = acc.Email;
        document.getElementById('emailPass').value = acc.EmailPass;
        document.getElementById('proxy').value = acc.Proxy;
        document.getElementById('mafile').value = acc.MaFile || '';
        document.getElementById('modal').classList.remove('hidden');
    }

    function saveAccount() {
        const data = {
            Login: document.getElementById('login').value,
            Password: document.getElementById('password').value,
            Email: document.getElementById('email').value,
            EmailPass: document.getElementById('emailPass').value,
            Proxy: document.getElementById('proxy').value,
            MaFile: document.getElementById('mafile').value,
            Status: "Offline",
            Balance: "0 ₽"
        };

        if (currentEditId) {
            const acc = accounts.find(a => a.Id === currentEditId);
            Object.assign(acc, data);
        } else {
            accounts.push({
                Id: crypto.randomUUID(),
                ...data,
                CreatedAt: new Date().toISOString(),
                UpdatedAt: new Date().toISOString()
            });
        }

        saveToCSharp();
        closeModal();
        renderAccounts();
    }

    function closeModal() {
        document.getElementById('modal').classList.add('hidden');
    }

    function runASF(id) {
        window.chrome.webview.postMessage(JSON.stringify({ action: "runASF", data: id }));
    }

    function openAntiDetect(id) {
        window.chrome.webview.postMessage(JSON.stringify({ action: "openBrowser", data: id }));
    }

    function deleteAccount(id) {
        if (confirm("Удалить аккаунт?")) {
            accounts = accounts.filter(a => a.Id !== id);
            saveToCSharp();
            renderAccounts();
        }
    }

    function saveToCSharp() {
        window.chrome.webview.postMessage(JSON.stringify({ action: "saveAccounts", data: accounts }));
    }

    window.receiveFromCSharp = function(msg) {
        if (msg.type === "accounts") {
            accounts = msg.data || [];
            renderAccounts();
        }
    };

    // Запуск
    window.onload = () => {
        window.chrome.webview.postMessage(JSON.stringify({ action: "getAccounts" }));
    };
    </script>
</body>
</html>
